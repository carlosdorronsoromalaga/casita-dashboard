<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casita en Holanda</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #0f1419; --panel: #1a2129; --panel2: #232c36; --text: #e6edf3;
    --muted: #8b98a5; --accent: #4ade80; --accent2: #22c55e; --danger: #f87171;
    --gold: #fbbf24; --blue: #60a5fa; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
  header { padding: 16px 24px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
           border-bottom: 1px solid #2b3644; position: sticky; top: 0; background: var(--bg); z-index: 500; }
  header h1 { font-size: 20px; color: var(--accent); }
  header .stats { color: var(--muted); font-size: 13px; }
  header .addbtn { margin-left: auto; background: var(--panel2); color: var(--text); border: 1px solid #37404b;
                   border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .controls { display: flex; gap: 8px; padding: 12px 24px; flex-wrap: wrap; align-items: center;
              background: var(--panel); border-bottom: 1px solid #2b3644; }
  .controls input, .controls select {
    background: var(--panel2); color: var(--text); border: 1px solid #37404b;
    border-radius: 8px; padding: 7px 10px; font-size: 13px; outline: none;
  }
  .controls input:focus, .controls select:focus { border-color: var(--accent2); }
  .tabs { display: flex; gap: 6px; padding: 12px 24px 0; flex-wrap: wrap; }
  .tab { background: var(--panel); border: 1px solid #37404b; color: var(--muted); border-radius: 999px;
         padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .tab.active { background: var(--accent2); color: #06220f; border-color: var(--accent2); font-weight: 600; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; padding: 18px 24px; }
  .card { background: var(--panel); border: 1px solid #2b3644; border-radius: var(--radius);
          overflow: hidden; display: flex; flex-direction: column; transition: border-color .15s; }
  .card:hover { border-color: #4b5865; }
  .card.fav { border-color: var(--gold); }
  .card.contacted { border-color: var(--blue); }
  .card.warn-check { border-color: #b8860b; }
  .card.warn-scam { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger); }
  .card.excluded { opacity: .55; }
  .card .imgwrap { height: 170px; background: var(--panel2); position: relative; }
  .card .imgwrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .imgwrap .noimg { display: flex; align-items: center; justify-content: center; height: 100%;
                           color: #3d4854; font-size: 40px; }
  .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.72); color: #fff;
           font-size: 11px; padding: 3px 8px; border-radius: 6px; }
  .badge.new { background: var(--accent2); color: #06220f; font-weight: 700; }
  .badge.right { left: auto; right: 8px; }
  .badge.deal { top: auto; bottom: 8px; left: 8px; background: #7c2d12; color: #fdba74; font-weight: 700; }
  .banner { padding: 5px 10px; font-size: 12px; font-weight: 700; text-align: center; }
  .banner.check { background: #3f2d13; color: var(--gold); }
  .banner.scam { background: #450a0a; color: #fca5a5; }
  .body { padding: 12px 14px 8px; flex: 1; }
  .price { font-size: 20px; font-weight: 700; color: var(--accent); }
  .price small { color: var(--muted); font-weight: 400; font-size: 12px; }
  .title { font-size: 14px; margin: 4px 0 2px; line-height: 1.35; }
  .title a { color: var(--text); text-decoration: none; }
  .title a:hover { color: var(--accent); text-decoration: underline; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .chip { display: inline-block; background: var(--panel2); border-radius: 5px; padding: 1px 7px;
          font-size: 11px; margin: 2px 4px 0 0; color: var(--muted); }
  .chip.chollo { color: #06220f; background: var(--accent); font-weight: 700; }
  .chip.warn { background: #3f2d13; color: var(--gold); }
  .chip.scam { background: #450a0a; color: #fca5a5; font-weight: 700; }
  .chip.gray { background: #2a2f36; color: #6b7683; }
  .ficha { background: var(--panel2); border-top: 1px solid #2b3644; padding: 10px 14px;
           font-size: 12px; color: var(--muted); display: none; }
  .ficha.open { display: block; }
  .ficha h4 { color: var(--text); font-size: 12px; margin: 6px 0 3px; }
  .ficha ul { margin: 0 0 4px 16px; }
  .actions { display: flex; border-top: 1px solid #2b3644; }
  .actions button { flex: 1; background: none; border: none; color: var(--muted); padding: 9px 0;
                    font-size: 15px; cursor: pointer; transition: background .12s; }
  .actions button:hover { background: var(--panel2); }
  .actions button.on-fav { color: var(--gold); }
  .actions button.on-contact { color: var(--blue); }
  .actions button.on-discard { color: var(--danger); }
  .actions button.on-compare { color: var(--accent); }
  .notes { width: 100%; background: var(--panel2); border: none; border-top: 1px solid #2b3644;
           color: var(--text); font-size: 12px; padding: 7px 12px; resize: none; outline: none; }
  .notes::placeholder { color: #4b5865; }
  #empty { text-align: center; color: var(--muted); padding: 60px 20px; grid-column: 1 / -1; }
  #count { color: var(--muted); font-size: 13px; margin-left: auto; }
  .toggle { color: var(--muted); font-size: 12px; display: inline-flex; align-items: center;
            gap: 5px; cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent2); }
  #map { height: calc(100vh - 220px); margin: 18px 24px; border-radius: var(--radius); display: none; }
  #comparebar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
                border-top: 2px solid var(--accent2); padding: 10px 24px; display: none;
                align-items: center; gap: 12px; z-index: 600; }
  #comparebar button { background: var(--accent2); color: #06220f; border: none; border-radius: 8px;
                       padding: 8px 16px; font-weight: 700; cursor: pointer; }
  #comparebar .clear { background: var(--panel2); color: var(--muted); }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 700; display: none;
           overflow: auto; padding: 30px 16px; }
  .modal.open { display: block; }
  .modal-inner { background: var(--panel); border-radius: var(--radius); max-width: 1100px;
                 margin: auto; padding: 20px; }
  .modal-inner h2 { color: var(--accent); font-size: 18px; margin-bottom: 12px; }
  .modal-close { float: right; background: var(--panel2); color: var(--text); border: none;
                 border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  table.cmp { border-collapse: collapse; width: 100%; font-size: 13px; }
  table.cmp th, table.cmp td { border: 1px solid #2b3644; padding: 7px 10px; text-align: left;
                                vertical-align: top; }
  table.cmp th { background: var(--panel2); color: var(--muted); white-space: nowrap; width: 130px; }
  table.cmp td.best { background: #14331f; color: var(--accent); font-weight: 600; }
  table.cmp img { width: 100%; max-width: 200px; border-radius: 8px; }
  .proslist { margin-left: 16px; } .proslist.cons { color: #f0a8a8; }
  .addform label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 3px; }
  .addform input, .addform select { width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid #37404b; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .addform button { margin-top: 14px; background: var(--accent2); color: #06220f; border: none;
    border-radius: 8px; padding: 10px 18px; font-weight: 700; cursor: pointer; }
  @media (max-width: 640px) { #grid { grid-template-columns: 1fr; padding: 12px; } }
</style>
</head>
<body>
<header>
  <h1>🏠 Casita en Holanda</h1>
  <span class="stats" id="stats">cargando…</span>
  <button class="addbtn" onclick="document.getElementById('addModal').classList.add('open')">➕ Añadir manual</button>
</header>
<div class="tabs" id="tabs">
  <button class="tab active" data-tab="active">Activos</button>
  <button class="tab" data-tab="new48">Nuevos (48 h)</button>
  <button class="tab" data-tab="chollos">🔥 Chollos</button>
  <button class="tab" data-tab="map">🗺 Mapa</button>
  <button class="tab" data-tab="favorite">⭐ Favoritos</button>
  <button class="tab" data-tab="contacted">✉️ Contactados</button>
  <button class="tab" data-tab="discarded">🗑 Descartados</button>
  <button class="tab" data-tab="all">Todo</button>
</div>
<div class="controls">
  <input id="q" placeholder="Buscar calle o ciudad…" size="18">
  <select id="city"><option value="">Todas las ciudades</option></select>
  <input id="pmax" type="number" placeholder="€ máx" style="width:80px">
  <input id="m2min" type="number" placeholder="m² mín" style="width:80px">
  <select id="ptype">
    <option value="">Todo tipo</option>
    <option value="apartment">Apartamento</option>
    <option value="studio">Estudio</option>
    <option value="house">Casa</option>
    <option value="room">Habitación</option>
  </select>
  <select id="furn">
    <option value="">Amueblado: da igual</option>
    <option value="furnished">Amueblado</option>
    <option value="upholstered">Semiamueblado</option>
    <option value="unfurnished">Sin amueblar</option>
  </select>
  <select id="trustf">
    <option value="">Confianza: todas</option>
    <option value="verified">Solo verificados</option>
    <option value="needs_check">⚠ Por comprobar</option>
    <option value="possible_scam">🚨 Posibles estafas</option>
  </select>
  <select id="portal"><option value="">Todos los portales</option></select>
  <select id="sort">
    <option value="newest">Más recientes</option>
    <option value="deal">Mejor chollo</option>
    <option value="price">Precio ↑</option>
    <option value="priceDesc">Precio ↓</option>
    <option value="perm2">€/m² ↑</option>
    <option value="size">m² ↓</option>
  </select>
  <label class="toggle"><input type="checkbox" id="outdoorF"> 🌿 Con exterior</label>
  <label class="toggle"><input type="checkbox" id="noStudent" checked> Sin solo-estudiantes</label>
  <label class="toggle"><input type="checkbox" id="noTemp" checked> Larga estancia</label>
  <label class="toggle"><input type="checkbox" id="couple" checked> Aptos pareja</label>
  <span id="count"></span>
</div>
<div id="grid"></div>
<div id="map"></div>

<div id="comparebar">
  <span id="compareinfo"></span>
  <button onclick="openCompare()">⚖ Comparar</button>
  <button class="clear" onclick="clearCompare()">Limpiar</button>
</div>

<div class="modal" id="compareModal">
  <div class="modal-inner">
    <button class="modal-close" onclick="document.getElementById('compareModal').classList.remove('open')">✕ Cerrar</button>
    <h2>⚖ Comparador</h2>
    <div id="compareBody" style="overflow-x:auto"></div>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="modal-inner" style="max-width:480px">
    <button class="modal-close" onclick="document.getElementById('addModal').classList.remove('open')">✕ Cerrar</button>
    <h2>➕ Añadir anuncio manual</h2>
    <p style="color:var(--muted);font-size:12px">Para anuncios de grupos de Facebook u otras fuentes.
    Se marcará automáticamente como "⚠ requiere comprobación".</p>
    <div class="addform">
      <label>URL del anuncio *</label><input id="addUrl" placeholder="https://facebook.com/groups/...">
      <label>Título *</label><input id="addTitle" placeholder="Piso 2 hab. en Utrecht Oost">
      <label>Ciudad *</label><input id="addCity" placeholder="Utrecht">
      <label>Precio €/mes</label><input id="addPrice" type="number">
      <label>m²</label><input id="addSize" type="number">
      <label>Tipo</label>
      <select id="addType">
        <option value="apartment">Apartamento</option>
        <option value="studio">Estudio</option>
        <option value="house">Casa</option>
        <option value="room">Habitación</option>
      </select>
      <label>Notas</label><input id="addNotes" placeholder="Del grupo 'Housing Utrecht'...">
      <button onclick="submitAdd()">Guardar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

function afterLoad() {
  DATA.forEach(l => { try { l._reasons = JSON.parse(l.deal_reasons || '[]'); } catch(e) { l._reasons = []; }
                      try { l._details = JSON.parse(l.details_json || 'null'); } catch(e) { l._details = null; } });

// ---------- capa de datos: Supabase (version online) ----------
let SB = null;

// Configuracion incrustada en build (la clave publishable es publica por
// diseno; la seguridad real la dan el login y las politicas RLS del servidor).
// Antes se pedia por prompt() y se guardaba en localStorage: fragil (valores
// viejos pegados, prompts bloqueados, errores al pegar).
function sbConfig() {
  return { url: 'https://wzikfazbfgtxljtkkphm.supabase.co', anon: 'sb_publishable_pMmT_8oxKBcqU-fD_4yTqA_YKNVm6jN' };
}

function showLogin() {
  const div = document.createElement('div');
  div.id = 'loginOverlay';
  div.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `<div style="background:var(--panel);padding:30px;border-radius:12px;max-width:340px;width:90%">
    <h2 style="color:var(--accent);margin-bottom:14px">🏠 Casita en Holanda</h2>
    <div class="addform">
      <label>Email</label><input id="liEmail" type="email" autocomplete="username">
      <label>Contraseña</label><input id="liPass" type="password" autocomplete="current-password">
      <button onclick="doLogin()">Entrar</button>
      <p id="liErr" style="color:var(--danger);font-size:12px;margin-top:8px"></p>
    </div></div>`;
  document.body.appendChild(div);
}

async function doLogin() {
  const { error } = await SB.auth.signInWithPassword({
    email: document.getElementById('liEmail').value.trim(),
    password: document.getElementById('liPass').value,
  });
  if (error) { document.getElementById('liErr').textContent = 'Error: ' + error.message; return; }
  document.getElementById('loginOverlay').remove();
  await fetchAll();
}

async function fetchAll() {
  let all = [], from = 0;
  while (true) {
    const { data, error } = await SB.from('listings').select('*').range(from, from + 999);
    if (error) { alert('Error cargando datos: ' + error.message); return; }
    all = all.concat(data);
    if (data.length < 1000) break;
    from += 1000;
  }
  DATA = all;
  afterLoad();
}

async function load() {
  const cfg = sbConfig();
  SB = supabase.createClient(cfg.url, cfg.anon);
  const { data: { session } } = await SB.auth.getSession();
  if (!session) { showLogin(); return; }
  await fetchAll();
}


function perM2(l) { return l.price_eur && l.size_m2 ? l.price_eur / l.size_m2 : null; }
function isChollo(l) { return l.deal_score != null && l.deal_score >= CONFIG.deal_chollo
                        && l.trust !== 'possible_scam' && !l.auto_excluded; }

function visible() {
  const q = $('q').value.toLowerCase(), city = $('city').value,
        pmax = parseFloat($('pmax').value) || null, m2min = parseFloat($('m2min').value) || null,
        ptype = $('ptype').value, portal = $('portal').value,
        furn = $('furn').value, trustf = $('trustf').value;
  const now = Date.now();
  let out = DATA.filter(l => {
    if (TAB !== 'all' && l.auto_excluded) return false;
    if (TAB === 'active' && (!l.active || l.status === 'discarded')) return false;
    if (TAB === 'new48') {
      if (!l.active || l.status === 'discarded') return false;
      if (now - new Date(l.first_seen).getTime() > 48 * 3600e3) return false;
    }
    if (TAB === 'chollos' && !(isChollo(l) && l.active && l.status !== 'discarded')) return false;
    if (TAB === 'favorite' && l.status !== 'favorite') return false;
    if (TAB === 'contacted' && l.status !== 'contacted') return false;
    if (TAB === 'discarded' && l.status !== 'discarded') return false;
    if (q && !(l.title.toLowerCase().includes(q) || l.city.toLowerCase().includes(q))) return false;
    if (city && l.city !== city) return false;
    if (pmax != null && (l.price_eur == null || l.price_eur > pmax)) return false;
    if (m2min != null && (l.size_m2 == null || l.size_m2 < m2min)) return false;
    if (ptype && l.property_type !== ptype) return false;
    if (portal && l.portal !== portal) return false;
    if (furn && l.furnished !== furn) return false;
    if (trustf && l.trust !== trustf) return false;
    if ($('outdoorF').checked && !l.outdoor) return false;
    if ($('noStudent').checked && l.student_only === 1) return false;
    if ($('noTemp').checked && l.temporary === 1) return false;
    if ($('couple').checked && l.max_persons != null && l.max_persons < 2) return false;
    return true;
  });
  const sort = $('sort').value;
  const key = {
    newest: l => -new Date(l.first_seen).getTime(),
    deal: l => -(l.deal_score ?? -1),
    price: l => l.price_eur ?? 1e9,
    priceDesc: l => -(l.price_eur ?? 0),
    perm2: l => perM2(l) ?? 1e9,
    size: l => -(l.size_m2 ?? 0),
  }[sort];
  out.sort((a, b) => key(a) - key(b));
  return out;
}

const DET_LABELS = {
  deposit_eur: v => `Depósito: ${fmt(v)} €`,
  deposit_months: v => `Depósito: ${v} mes(es) de renta`,
  available_text: v => `Entrada: ${v}`,
  min_duration_months: v => `Contrato mínimo: ${v} meses`,
  income_requirement: v => `Requisito de ingresos: ${v}`,
  registration: v => v === 'yes' ? 'Empadronamiento (inschrijving): ✅ posible' : 'Empadronamiento: ❌ NO posible',
  service_costs_eur: v => `Gastos de servicio: ${fmt(v)} €/mes`,
  upfront: v => `Por adelantado: ${v}`,
};

function fichaHTML(l) {
  let parts = [];
  if (l._details && Object.keys(l._details).length) {
    parts.push('<h4>📋 Condiciones (de la página del anuncio)</h4><ul>' +
      Object.entries(l._details).map(([k, v]) => `<li>${(DET_LABELS[k] || (x => k + ': ' + x))(v)}</li>`).join('') + '</ul>');
  } else if (l.enriched_at) {
    parts.push('<h4>📋 Condiciones</h4><p>No se encontraron condiciones explícitas en el anuncio — preguntar al contactar: depósito, meses por adelantado, duración mínima y si el empadronamiento es posible.</p>');
  } else {
    parts.push('<h4>📋 Condiciones</h4><p>Ficha aún no descargada (se enriquece en el próximo rastreo).</p>');
  }
  if (l._reasons.length) {
    parts.push(`<h4>🔥 Deal score ${l.deal_score?.toFixed(0)}/100</h4><ul>` +
      l._reasons.map(r => `<li>${r}</li>`).join('') + '</ul>');
  }
  if (l.trust_reason) parts.push(`<h4>⚠ Confianza</h4><p>${l.trust_reason}</p>`);
  if (l.auto_excluded_reason) parts.push(`<h4>🚫 Excluido automáticamente</h4><p>${l.auto_excluded_reason}</p>`);
  return parts.join('');
}

const OUTDOOR_ES = {balcony: 'balcón', terrace: 'terraza', garden: 'jardín'};

function card(l) {
  const isNew = Date.now() - new Date(l.first_seen).getTime() < 48 * 3600e3;
  const pm2 = perM2(l);
  const typeES = {apartment:'Apartamento', studio:'Estudio', house:'Casa', room:'Habitación', unknown:''}[l.property_type] || '';
  const outdoorTxt = l.outdoor ? l.outdoor.split(',').map(o => OUTDOOR_ES[o] || o).join(', ') : '';
  const trustCls = l.trust === 'possible_scam' ? 'warn-scam' : (l.trust === 'needs_check' ? 'warn-check' : '');
  let banner = '';
  if (l.trust === 'possible_scam') banner = `<div class="banner scam" title="${l.trust_reason || ''}">🚨 POSIBLE ESTAFA — ${(l.trust_reason || '').startsWith('precio') ? 'precio anómalo' : 'criterio propio (no por precio)'}</div>`;
  else if (l.trust === 'needs_check') banner = '<div class="banner check">⚠ REQUIERE COMPROBACIÓN HUMANA</div>';
  return `<div class="card ${l.status === 'favorite' ? 'fav' : ''} ${l.status === 'contacted' ? 'contacted' : ''} ${trustCls} ${l.auto_excluded ? 'excluded' : ''}" data-id="${l.id}">
    ${banner}
    <div class="imgwrap">
      ${l.image_url ? `<img src="${l.image_url}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=noimg>🏠</div>'">`
                     : '<div class="noimg">🏠</div>'}
      ${isNew ? '<span class="badge new">NUEVO</span>' : ''}
      ${!l.active ? '<span class="badge">retirado</span>' : ''}
      ${isChollo(l) ? `<span class="badge deal">🔥 ${l.deal_score.toFixed(0)}</span>` : ''}
      <span class="badge right">${l.portal}</span>
    </div>
    <div class="body">
      <div class="price">${fmt(l.price_eur)} € <small>/mes${l.price_type === 'all_in' ? ' (gastos incl.)' : ''}</small></div>
      <div class="title"><a href="${l.url}" target="_blank" rel="noopener">${l.title}</a></div>
      <div class="meta">📍 ${l.city}
        ${l.size_m2 ? ' · ' + fmt(l.size_m2) + ' m²' : ''}
        ${pm2 ? ' · ' + pm2.toFixed(1) + ' €/m²' : ''}
        ${l.rooms ? ' · ' + l.rooms + ' hab.' : ''}</div>
      <div class="meta" style="margin-top:6px">
        ${typeES ? `<span class="chip">${typeES}</span>` : ''}
        ${l.furnished ? `<span class="chip">${{furnished:'Amueblado', upholstered:'Semi', unfurnished:'Sin muebles'}[l.furnished] || ''}</span>` : ''}
        ${outdoorTxt ? `<span class="chip" style="color:var(--accent)">🌿 ${outdoorTxt}</span>` : ''}
        ${l.student_only === 1 ? '<span class="chip warn">🎓 solo estudiantes</span>' : ''}
        ${l.temporary === 1 ? '<span class="chip warn">⏳ temporal</span>' : ''}
        ${l.max_persons != null && l.max_persons < 2 ? '<span class="chip warn">👤 solo 1 persona</span>' : ''}
        ${l.auto_excluded ? `<span class="chip gray" title="${l.auto_excluded_reason || ''}">🚫 auto-excluido</span>` : ''}
        <span class="chip" style="cursor:pointer" onclick="this.closest('.card').querySelector('.ficha').classList.toggle('open')">📋 ficha</span>
      </div>
    </div>
    <div class="ficha">${fichaHTML(l)}</div>
    <div class="actions">
      <button title="Favorito" class="${l.status === 'favorite' ? 'on-fav' : ''}"
        onclick="setStatus('${l.id}', '${l.status === 'favorite' ? 'seen' : 'favorite'}')">⭐</button>
      <button title="Contactado" class="${l.status === 'contacted' ? 'on-contact' : ''}"
        onclick="setStatus('${l.id}', '${l.status === 'contacted' ? 'seen' : 'contacted'}')">✉️</button>
      <button title="Descartar" class="${l.status === 'discarded' ? 'on-discard' : ''}"
        onclick="setStatus('${l.id}', '${l.status === 'discarded' ? 'seen' : 'discarded'}')">🗑</button>
      <button title="Comparar" class="${COMPARE.has(l.id) ? 'on-compare' : ''}"
        onclick="toggleCompare('${l.id}')">⚖</button>
    </div>
    <textarea class="notes" rows="1" placeholder="Notas (se guardan solas)…"
      onchange="setNotes('${l.id}', this.value)">${l.notes || ''}</textarea>
  </div>`;
}

function render() {
  const isMap = TAB === 'map';
  $('grid').style.display = isMap ? 'none' : 'grid';
  $('map').style.display = isMap ? 'block' : 'none';
  if (isMap) { renderMap(); $('count').textContent = ''; return; }
  const items = visible();
  $('count').textContent = items.length + ' anuncios';
  $('grid').innerHTML = items.length
    ? items.map(card).join('')
    : '<div id="empty">Sin resultados con estos filtros.</div>';
}

// ---------- mapa ----------
function renderMap() {
  const saveTab = TAB; TAB = 'active';        // el mapa agrega lo visible en "Activos"
  const items = visible(); TAB = saveTab;
  if (!MAP) {
    MAP = L.map('map').setView([52.15, 5.3], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { attribution: '© OpenStreetMap' }).addTo(MAP);
    MAPLAYER = L.layerGroup().addTo(MAP);
  }
  setTimeout(() => MAP.invalidateSize(), 100);
  MAPLAYER.clearLayers();
  const byCity = {};
  items.forEach(l => { (byCity[l.city] = byCity[l.city] || []).push(l); });
  Object.entries(byCity).forEach(([city, ls]) => {
    const coords = CITY_COORDS[city];
    if (!coords) return;
    const prices = ls.map(l => l.price_eur).filter(p => p).sort((a, b) => a - b);
    const minP = prices[0], medP = prices[Math.floor(prices.length / 2)];
    const chollos = ls.filter(isChollo).length;
    const m = L.circleMarker(coords, {
      radius: Math.min(26, 7 + Math.sqrt(ls.length) * 3),
      fillColor: chollos ? '#4ade80' : '#60a5fa', fillOpacity: .75, color: '#0f1419', weight: 2,
    }).addTo(MAPLAYER);
    m.bindTooltip(`<b>${city}</b>: ${ls.length}`, { direction: 'top' });
    m.bindPopup(`<b>${city}</b><br>${ls.length} anuncios activos<br>` +
      (minP ? `Desde <b>${fmt(minP)} €</b> · mediana ${fmt(medP)} €<br>` : '') +
      (chollos ? `🔥 ${chollos} chollos<br>` : '') +
      `<a href="#" onclick="filterCity('${city}');return false">Ver anuncios →</a>`);
  });
}
function filterCity(city) {
  $('city').value = city;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelector('.tab[data-tab=active]').classList.add('active');
  TAB = 'active';
  render();
}

// ---------- comparador ----------
function toggleCompare(id) {
  if (COMPARE.has(id)) COMPARE.delete(id);
  else if (COMPARE.size >= 4) { alert('Máximo 4 anuncios a comparar'); return; }
  else COMPARE.add(id);
  $('comparebar').style.display = COMPARE.size ? 'flex' : 'none';
  $('compareinfo').textContent = `${COMPARE.size} anuncio(s) seleccionado(s)`;
  render();
}
function clearCompare() { COMPARE.clear(); $('comparebar').style.display = 'none'; render(); }

function prosCons(l, others) {
  const pros = [], cons = [];
  const cheapest = others.every(o => o.price_eur == null || (l.price_eur != null && l.price_eur <= o.price_eur));
  const biggest = others.every(o => o.size_m2 == null || (l.size_m2 != null && l.size_m2 >= o.size_m2));
  const bestPm2 = others.every(o => perM2(o) == null || (perM2(l) != null && perM2(l) <= perM2(o)));
  if (l.price_eur != null && cheapest && others.length) pros.push('El más barato de la comparación');
  if (l.size_m2 != null && biggest && others.length) pros.push('El más grande');
  if (perM2(l) != null && bestPm2 && others.length) pros.push('Mejor €/m²');
  if (['apartment','house','studio'].includes(l.property_type)) pros.push('Vivienda entera'); else if (l.property_type === 'room') cons.push('Habitación (compartir casa)');
  if (l.furnished === 'furnished') pros.push('Amueblado'); else if (l.furnished === 'unfurnished') cons.push('Sin amueblar (coste inicial en muebles)');
  if (l.outdoor) pros.push('Espacio exterior: ' + l.outdoor.split(',').map(o => OUTDOOR_ES[o] || o).join(', '));
  if (l.price_type === 'all_in') pros.push('Gastos incluidos');
  if (l.trust === 'verified') pros.push('Portal verificado');
  if (l.trust === 'needs_check') cons.push('⚠ Requiere comprobación (particular)');
  if (l.trust === 'possible_scam') cons.push('🚨 Posible estafa: ' + (l.trust_reason || ''));
  if (l._details?.registration === 'no') cons.push('❌ Sin empadronamiento posible');
  if (l._details?.registration === 'yes') pros.push('✅ Empadronamiento posible');
  if (l._details?.deposit_months >= 2 || l._details?.deposit_eur >= 3000) cons.push('Depósito alto');
  if (l.temporary === 1) cons.push('Contrato temporal');
  if (l.student_only === 1) cons.push('Solo estudiantes');
  return { pros, cons };
}

function openCompare() {
  const sel = DATA.filter(l => COMPARE.has(l.id));
  if (sel.length < 2) { alert('Selecciona al menos 2 anuncios con ⚖'); return; }
  const best = fn => { const vals = sel.map(fn); const ok = vals.filter(v => v != null); return ok.length ? Math.min(...ok) : null; };
  const bestPrice = best(l => l.price_eur), bestPm2v = best(l => perM2(l));
  const maxSize = Math.max(...sel.map(l => l.size_m2 ?? -1)), maxDeal = Math.max(...sel.map(l => l.deal_score ?? -1));
  const row = (label, fn, bestTest) => `<tr><th>${label}</th>` +
    sel.map(l => `<td class="${bestTest && bestTest(l) ? 'best' : ''}">${fn(l)}</td>`).join('') + '</tr>';
  let html = '<table class="cmp"><tr><th></th>' +
    sel.map(l => `<td>${l.image_url ? `<img src="${l.image_url}">` : '🏠'}<br><a href="${l.url}" target="_blank"><b>${l.title.slice(0, 60)}</b></a></td>`).join('') + '</tr>';
  html += row('📍 Ciudad', l => l.city);
  html += row('💶 Precio', l => l.price_eur ? fmt(l.price_eur) + ' €' + (l.price_type === 'all_in' ? ' (incl.)' : '') : '?', l => l.price_eur === bestPrice);
  html += row('📐 m²', l => l.size_m2 ? fmt(l.size_m2) : '?', l => l.size_m2 === maxSize && maxSize > 0);
  html += row('€/m²', l => perM2(l) ? perM2(l).toFixed(1) : '?', l => perM2(l) === bestPm2v);
  html += row('🔥 Deal score', l => l.deal_score != null ? l.deal_score.toFixed(0) + '/100' : '?', l => l.deal_score === maxDeal && maxDeal > 0);
  html += row('🛋 Amueblado', l => ({furnished:'Sí', upholstered:'Semi', unfurnished:'No'})[l.furnished] || '?');
  html += row('🌿 Exterior', l => l.outdoor ? l.outdoor.split(',').map(o => OUTDOOR_ES[o] || o).join(', ') : '—');
  html += row('🏷 Tipo', l => ({apartment:'Apartamento', studio:'Estudio', house:'Casa', room:'Habitación'})[l.property_type] || '?');
  html += row('🔒 Confianza', l => ({verified:'✅ verificado', needs_check:'⚠ comprobar', possible_scam:'🚨 posible estafa'})[l.trust] || '?');
  html += row('💰 Depósito', l => l._details?.deposit_eur ? fmt(l._details.deposit_eur) + ' €' : (l._details?.deposit_months ? l._details.deposit_months + ' mes(es)' : '?'));
  html += row('📅 Entrada', l => l._details?.available_text || l.available_from?.slice(0, 10) || '?');
  html += row('🏛 Empadron.', l => l._details?.registration === 'yes' ? '✅' : (l._details?.registration === 'no' ? '❌' : '?'));
  html += row('Portal', l => l.portal);
  const pcs = sel.map(l => prosCons(l, sel.filter(o => o !== l)));
  html += '<tr><th>✅ Pros</th>' + pcs.map(pc => `<td><ul class="proslist">${pc.pros.map(p => `<li>${p}</li>`).join('') || '<li>—</li>'}</ul></td>`).join('') + '</tr>';
  html += '<tr><th>❌ Contras</th>' + pcs.map(pc => `<td><ul class="proslist cons">${pc.cons.map(c => `<li>${c}</li>`).join('') || '<li>—</li>'}</ul></td>`).join('') + '</tr>';
  html += '</table>';
  $('compareBody').innerHTML = html;
  $('compareModal').classList.add('open');
}

// ---------- estado / notas / alta manual ----------

async function setStatus(id, status) {
  const { error } = await SB.from('listings').update({ status }).eq('id', id);
  if (error) { alert('No guardado: ' + error.message); return; }
  const l = DATA.find(x => x.id === id);
  if (l) l.status = status;
  render();
}
async function setNotes(id, notes) {
  const { error } = await SB.from('listings').update({ notes }).eq('id', id);
  if (error) alert('No guardado: ' + error.message);
  const l = DATA.find(x => x.id === id);
  if (l) l.notes = notes;
}
async function submitAdd() {
  const body = collectAddForm();
  if (!body) return;
  const now = new Date().toISOString().slice(0, 19);
  const { error } = await SB.from('listings').insert({
    id: 'manual-' + Date.now(), portal: 'manual', title: body.title, city: body.city,
    price_eur: body.price_eur, price_type: 'unknown', size_m2: body.size_m2,
    property_type: body.property_type, url: body.url, raw_price_text: '',
    first_seen: now, last_seen: now, active: 1, status: 'new', notes: body.notes,
    trust: 'needs_check',
    trust_reason: 'añadido a mano (grupo de Facebook u otra fuente) — sin verificación',
  });
  if (error) { alert('Error al guardar: ' + error.message); return; }
  $('addModal').classList.remove('open');
  await fetchAll();
}


function collectAddForm() {
  const body = {
    url: $('addUrl').value.trim(), title: $('addTitle').value.trim(),
    city: $('addCity').value.trim(), price_eur: parseFloat($('addPrice').value) || null,
    size_m2: parseFloat($('addSize').value) || null, property_type: $('addType').value,
    notes: $('addNotes').value.trim(),
  };
  if (!body.url || !body.title || !body.city) { alert('URL, título y ciudad son obligatorios'); return null; }
  return body;
}

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  TAB = t.dataset.tab;
  render();
});
['q', 'city', 'pmax', 'm2min', 'ptype', 'portal', 'sort', 'furn', 'trustf',
 'outdoorF', 'noStudent', 'noTemp', 'couple'].forEach(id =>
  $(id).addEventListener('input', render));

load();
