<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApplyBoard</title>
<style>
  /* Sistema de diseño ApplyBoard. Tema claro/oscuro por CSS vars; el acento
     (--accent*) lo fija el perfil del usuario en runtime. Neutros con un
     ligero sesgo frío (azul-gris) para que se lean "elegidos", no por defecto. */
  :root {
    --bg:#0b0e13; --panel:#141922; --panel2:#1b212c; --panel3:#222a36;
    --line:#262e3a; --line2:#313b49;
    --text:#eaf0f7; --muted:#93a1b3; --faint:#69788c;
    --danger:#f77066; --green:#48d17f; --gold:#f5b83e;
    --accent:#3987e5; --accent-soft:#6da7ec; --accent-strong:#1c5cab; --accent-ink:#fff;
    --accent-wash:rgba(57,135,229,.12);
    --ink:#eaf0f7; --ink2:#93a1b3; --grid:#232b37;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.22);
    --shadow-sm:0 1px 2px rgba(0,0,0,.25);
    --font:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  }
  :root[data-theme="light"] {
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#f2f4f7; --panel3:#e9edf2;
    --line:#e4e8ee; --line2:#d6dce4;
    --text:#141a22; --muted:#5b6675; --faint:#8a94a3;
    --danger:#dc4c40; --green:#1f9d5b; --gold:#c98a12;
    --accent-wash:rgba(57,135,229,.10);
    --ink:#141a22; --ink2:#5b6675; --grid:#eef1f5;
    --shadow:0 1px 2px rgba(20,26,34,.06), 0 6px 20px rgba(20,26,34,.06);
    --shadow-sm:0 1px 2px rgba(20,26,34,.05);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font);
         font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  button, input, select, textarea { font-family:inherit; }
  ::selection { background:var(--accent-wash); }

  /* header */
  header { padding:11px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
           border-bottom:1px solid var(--line); position:sticky; top:0;
           background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:blur(10px); z-index:500; }
  header h1 { font-size:16px; font-weight:700; letter-spacing:-.01em; color:var(--text);
              display:flex; align-items:center; gap:8px; }
  header h1 .dot { width:9px; height:9px; border-radius:50%; background:var(--accent);
                   box-shadow:0 0 0 4px var(--accent-wash); }
  .hbtn { background:var(--panel2); color:var(--text); border:1px solid var(--line);
          border-radius:var(--radius-sm); padding:6px 11px; font-size:13px; cursor:pointer;
          transition:border-color .15s, background .15s; display:inline-flex; align-items:center; gap:6px; }
  .hbtn:hover { border-color:var(--line2); background:var(--panel3); }
  .spacer { margin-left:auto; }

  /* KPI stat tiles en el header */
  .kpis { display:flex; gap:8px; flex-wrap:wrap; }
  .kpi { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-sm);
         padding:6px 13px; text-align:left; min-width:64px; box-shadow:var(--shadow-sm); }
  .kpi .n { font-size:16px; font-weight:750; letter-spacing:-.02em; color:var(--text);
            font-variant-numeric:tabular-nums; }
  .kpi .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:1px; }
  .kpi.accent .n { color:var(--accent); } .kpi.good .n { color:var(--green); } .kpi.bad .n { color:var(--danger); }

  /* tabs */
  .tabs { display:flex; gap:4px; padding:12px 24px 0; flex-wrap:wrap; }
  .tab { background:transparent; border:1px solid transparent; color:var(--muted);
         border-radius:var(--radius-sm); padding:6px 13px; font-size:13px; font-weight:500;
         cursor:pointer; transition:background .15s, color .15s; }
  .tab:hover { background:var(--panel2); color:var(--text); }
  .tab.active { background:var(--accent); color:var(--accent-ink); font-weight:600;
                box-shadow:0 2px 8px var(--accent-wash); }

  /* controles */
  .controls { display:flex; gap:8px; padding:12px 24px; flex-wrap:wrap; align-items:center;
              border-bottom:1px solid var(--line); }
  .controls input, .controls select { background:var(--panel); color:var(--text);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:7px 11px; font-size:13px;
    outline:none; transition:border-color .15s, box-shadow .15s; }
  .controls input:focus, .controls select:focus { border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-wash); }
  .toggle { color:var(--muted); font-size:12.5px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
  .toggle input { accent-color:var(--accent); }
  #count { color:var(--faint); font-size:12.5px; margin-left:auto; font-variant-numeric:tabular-nums; }

  /* lista de ofertas */
  #list { padding:18px 24px 60px; display:flex; flex-direction:column; gap:11px; max-width:1000px; margin:auto; }
  .job { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
         padding:15px 17px; box-shadow:var(--shadow-sm); transition:border-color .15s, box-shadow .15s; }
  .job:hover { border-color:var(--line2); box-shadow:var(--shadow); }
  .job.starred { border-color:color-mix(in srgb, var(--gold) 55%, var(--line)); }
  .job.applied { border-left:3px solid var(--green); }
  .job-top { display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; }
  .fit { font-size:21px; font-weight:800; letter-spacing:-.03em; color:var(--accent);
         min-width:38px; font-variant-numeric:tabular-nums; }
  .fit.high { color:var(--green); }
  .fit.low { color:var(--faint); }
  .co { font-weight:700; font-size:15px; letter-spacing:-.01em; }
  .ti { font-size:13.5px; color:var(--muted); flex:1 1 100%; margin-top:1px; }
  .meta { color:var(--muted); font-size:12px; margin-top:8px; display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
  .chip { background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:2px 8px;
          font-size:11px; color:var(--muted); font-weight:500; }
  .chip.on { color:var(--green); border-color:color-mix(in srgb,var(--green) 30%, var(--line)); background:color-mix(in srgb,var(--green) 8%, transparent); }
  .chip.warn { color:var(--gold); border-color:color-mix(in srgb,var(--gold) 30%, var(--line)); background:color-mix(in srgb,var(--gold) 8%, transparent); }
  .btns { display:flex; gap:7px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  .btns a, .btns button { background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:var(--radius-sm); padding:6px 12px; font-size:12.5px; font-weight:500; cursor:pointer;
    text-decoration:none; transition:border-color .15s, background .15s; }
  .btns a:hover, .btns button:hover { border-color:var(--line2); background:var(--panel3); }
  .btns .primary { background:var(--accent); border-color:var(--accent); color:var(--accent-ink); font-weight:600; }
  .btns .primary:hover { background:var(--accent-strong); border-color:var(--accent-strong); }
  .btns .applybtn { background:color-mix(in srgb,var(--green) 15%, transparent); border-color:color-mix(in srgb,var(--green) 40%, var(--line)); color:var(--green); font-weight:600; }
  .btns .applybtn:hover { background:color-mix(in srgb,var(--green) 25%, transparent); }
  .btns button.staron { color:var(--gold); border-color:color-mix(in srgb,var(--gold) 45%, var(--line)); }
  .btns .danger { color:var(--danger); }
  .btns .danger:hover { border-color:color-mix(in srgb,var(--danger) 45%, var(--line)); }
  .btns select { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:var(--radius-sm); padding:6px 8px; font-size:12.5px; }
  .reasoning { display:none; background:var(--panel2); border:1px solid var(--line); border-radius:var(--radius-sm);
               padding:11px 13px; font-size:12.5px; color:var(--muted); margin-top:11px; white-space:pre-wrap; line-height:1.55; }
  .reasoning.open { display:block; }
  .reasoning b { color:var(--text); }
  .notes { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:var(--radius-sm);
           color:var(--text); font-size:12.5px; padding:8px 11px; resize:vertical; outline:none; margin-top:11px; min-height:32px; }
  .notes:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash); }
  .when { color:var(--faint); font-size:12px; }
  #empty { text-align:center; color:var(--muted); padding:70px 20px; font-size:14px; }
  #empty .big { font-size:34px; margin-bottom:10px; opacity:.5; }

  /* modales */
  .modal { position:fixed; inset:0; background:rgba(4,7,12,.62); z-index:700; display:none; overflow:auto; padding:34px 16px; backdrop-filter:blur(3px); }
  .modal.open { display:block; }
  .modal-inner { background:var(--panel); border-radius:var(--radius); max-width:520px; margin:auto; padding:22px; border:1px solid var(--line); box-shadow:var(--shadow); }
  .modal-inner h2 { font-size:17px; font-weight:700; letter-spacing:-.01em; margin-bottom:14px; }
  .modal-close { float:right; background:var(--panel2); color:var(--muted); border:1px solid var(--line); border-radius:var(--radius-sm); width:30px; height:30px; cursor:pointer; }
  .form label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; font-weight:500; }
  .form input, .form select, .form textarea { width:100%; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:8px 11px; font-size:13px; outline:none; }
  .form input:focus, .form select:focus, .form textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash); }
  .form .row { display:flex; gap:10px; } .form .row > div { flex:1; }
  .form .flags { display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; }
  .form button.save { margin-top:16px; background:var(--accent); color:var(--accent-ink); border:none;
    border-radius:var(--radius-sm); padding:10px 18px; font-weight:600; cursor:pointer; }
  .form button.save:hover { background:var(--accent-strong); }

  /* ===================== DASHBOARD ===================== */
  #dash { padding:20px 24px 60px; max-width:1120px; margin:auto; display:none; }
  .dash-hero { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
          padding:15px 16px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;
          cursor:default; transition:border-color .15s, transform .15s; }
  .stat.clk { cursor:pointer; } .stat.clk:hover { border-color:var(--accent); transform:translateY(-1px); }
  .stat .v { font-size:27px; font-weight:800; letter-spacing:-.03em; font-variant-numeric:tabular-nums; line-height:1; }
  .stat .k { font-size:11.5px; color:var(--muted); margin-top:6px; text-transform:uppercase; letter-spacing:.04em; }
  .stat .sub2 { font-size:11px; color:var(--faint); margin-top:3px; }
  .stat.good .v { color:var(--green); } .stat.bad .v { color:var(--danger); } .stat.accent .v { color:var(--accent); }
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
          padding:17px 18px; box-shadow:var(--shadow-sm); }
  .card.span2 { grid-column:1 / -1; }
  .card h3 { font-size:12.5px; color:var(--muted); font-weight:600; margin-bottom:16px;
             text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
  .card h3 .sub { font-size:11px; color:var(--faint); font-weight:400; text-transform:none; letter-spacing:0; }
  svg { display:block; width:100%; height:auto; overflow:visible; }
  .emptychart { color:var(--faint); font-size:12.5px; padding:26px 0; text-align:center; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:12px; font-size:12px; color:var(--muted); }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .legend i { width:10px; height:10px; border-radius:3px; display:inline-block; }
  .hbar-row { cursor:pointer; }
  .hbar-row:hover rect.bar { opacity:.85; }
  @media (max-width:640px){ #list{padding:14px} .kpis .kpi:nth-child(n+4){display:none}
    header h1 span.name{display:none} }
</style>
</head>
<body>
<header>
  <h1 id="brand"><span class="dot"></span>ApplyBoard</h1>
  <button class="hbtn" onclick="openAdd()">➕ Añadir</button>
  <div class="kpis spacer" id="kpis"></div>
  <button class="hbtn" id="themeBtn" title="Modo claro/oscuro" onclick="toggleTheme()">🌙</button>
  <button class="hbtn" id="trashBtn" title="Papelera" onclick="setTab('trash')">🗑</button>
  <button class="hbtn" title="Salir" onclick="logout()">Salir</button>
</header>
<div class="tabs" id="tabs"></div>
<div class="controls" id="controls">
  <input id="q" placeholder="Buscar puesto o empresa…" size="22">
  <select id="minfit">
    <option value="0" selected>fit: todos</option>
    <option value="6">fit ≥ 6</option>
    <option value="7">fit ≥ 7</option>
    <option value="8">fit ≥ 8</option>
    <option value="9">fit ≥ 9</option>
  </select>
  <select id="scope"></select>
  <select id="site"><option value="">Todas las fuentes</option></select>
  <select id="sort">
    <option value="fit">Ordenar: fit</option>
    <option value="discovered">Ordenar: más recientes</option>
    <option value="applied">Ordenar: fecha aplicada</option>
  </select>
  <label class="toggle"><input type="checkbox" id="noIntern"> Sin prácticas</label>
  <label class="toggle"><input type="checkbox" id="noSenior"> Sin senior/lead</label>
  <label class="toggle"><input type="checkbox" id="noLang"> Sin idioma bloqueante</label>
  <label class="toggle"><input type="checkbox" id="withCl"> Solo con carta lista</label>
  <span id="count"></span>
</div>
<div id="dash"></div>
<div id="list"></div>

<!-- modal: añadir / editar oferta -->
<div class="modal" id="jobModal">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal('jobModal')">✕</button>
    <h2 id="jobModalTitle">➕ Añadir oferta</h2>
    <div class="form">
      <label>URL de la oferta *</label><input id="fUrl" placeholder="https://...">
      <div class="row">
        <div><label>Empresa *</label><input id="fCompany"></div>
        <div><label>Fit (0-10)</label><input id="fFit" type="number" min="0" max="10"></div>
      </div>
      <label>Puesto *</label><input id="fTitle">
      <div class="row">
        <div><label>Ubicación</label><input id="fLocation"></div>
        <div><label>Ámbito</label><select id="fScope"></select></div>
      </div>
      <div class="row">
        <div><label>CV</label><select id="fCv"></select></div>
        <div><label>Fuente</label><input id="fSite" placeholder="manual"></div>
      </div>
      <label>Salario (si consta)</label><input id="fSalary">
      <label>Notas de condiciones (salario vs coste de vida, mudanza…)</label><textarea id="fConditions" rows="2"></textarea>
      <div class="flags">
        <label class="toggle"><input type="checkbox" id="fRemote"> Remoto</label>
        <label class="toggle"><input type="checkbox" id="fSenior"> Senior/lead</label>
        <label class="toggle"><input type="checkbox" id="fIntern"> Prácticas</label>
      </div>
      <label>Idioma bloqueante (si pide uno que no hablas)</label><input id="fLang" placeholder="p. ej. francés">
      <label>Notas</label><textarea id="fNotes" rows="2"></textarea>
      <button class="save" onclick="saveJob()">Guardar</button>
    </div>
  </div>
</div>

<!-- modal: carta -->
<div class="modal" id="letterModal">
  <div class="modal-inner" style="max-width:700px">
    <button class="modal-close" onclick="closeModal('letterModal')">✕</button>
    <h2>✉️ Carta de motivación</h2>
    <div id="letterCompany" style="color:var(--muted);font-size:13px;margin-bottom:10px"></div>
    <pre id="letterText" style="white-space:pre-wrap;font-family:inherit;font-size:13px;background:var(--panel2);border-radius:8px;padding:12px;max-height:60vh;overflow:auto"></pre>
    <button class="save" style="margin-top:14px" onclick="copyText(document.getElementById('letterText').textContent,this)">📋 Copiar carta</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================ configuración ============================
// Clave publishable: pública por diseño; la seguridad la dan login + RLS.
const SB_URL = 'https://wzikfazbfgtxljtkkphm.supabase.co';
const SB_ANON = 'sb_publishable_pMmT_8oxKBcqU-fD_4yTqA_YKNVm6jN';

let SB = null, DATA = [], PROFILE = null, TAB = 'dash', EDIT_ID = null;
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const validUrl = v => { const s=(v==null?'':String(v)).trim(); return (!s||['none','null','undefined'].includes(s.toLowerCase()))?null:s; };
const daysAgo = iso => iso ? Math.floor((Date.now()-new Date(iso).getTime())/86400e3) : null;
// "Consiguio entrevista": muchas entrevistas del historico estan marcadas en
// las NOTAS con "ENTREVISTA" (aunque luego acabaran en rechazo), no en el
// campo response_status. Contar ambas cosas -> el nº real de entrevistas.
const reachedInterview = j => /entrevista/i.test(j.user_notes||'') || ['entrevista','en_proceso','oferta'].includes(j.response_status);

// temas de acento (configurables por usuario en profiles.theme)
const THEMES = {
  blue:   { a:'#3987e5', soft:'#6da7ec', strong:'#1c5cab', ink:'#fff' },
  purple: { a:'#8b5cf6', soft:'#a78bfa', strong:'#6d28d9', ink:'#fff' },
  green:  { a:'#10b981', soft:'#34d399', strong:'#047857', ink:'#04140d' },
  amber:  { a:'#f59e0b', soft:'#fbbf24', strong:'#b45309', ink:'#1a1206' },
};
function applyTheme(name){
  const t = THEMES[name] || THEMES.blue;
  const r = document.documentElement.style;
  r.setProperty('--accent', t.a); r.setProperty('--accent-soft', t.soft);
  r.setProperty('--accent-strong', t.strong); r.setProperty('--accent-ink', t.ink);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme')==='light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', cur);
  $('themeBtn').textContent = cur==='light' ? '☀️' : '🌙';
}

// ámbitos geográficos: la lógica (test) vive en código (seguro); QUÉ ámbitos
// aparecen y en qué orden es dato por usuario (profiles.scopes).
const RANDSTAD_RE = /amsterdam|rotterdam|den haag|the hague|utrecht|amstelveen|haarlem|leiden|delft|schiphol|hoofddorp|zoetermeer|hilversum|almere/i;
const cityRe = re => j => re.test(j.location||'');
const SCOPE_DEFS = {
  all:      { label:'🌍 Todos', test:()=>true },
  // países / regiones
  spain:    { label:'🇪🇸 España', test:j=>j.is_spain },
  nl:       { label:'🇳🇱 Países Bajos', test:j=>j.is_nl },
  benelux:  { label:'🇧🇪🇱🇺 Benelux', test:j=>j.is_be||j.is_lu },
  europe:   { label:'🇪🇺 Europa', test:j=>j.is_europe||(j.is_remote&&!j.is_us) },
  ireland:  { label:'🇮🇪 Irlanda', test:j=>j.is_ireland },
  remote:   { label:'🏠 Remoto', test:j=>j.is_remote },
  // ciudades (match sobre location) — se eligen por usuario en profiles.scopes
  madrid:    { label:'📍 Madrid', test:cityRe(/madrid/i) },
  barcelona: { label:'📍 Barcelona', test:cityRe(/barcelona/i) },
  amsterdam: { label:'📍 Ámsterdam', test:cityRe(/amsterdam/i) },
  randstad:  { label:'📍 Randstad', test:j=>j.is_nl && RANDSTAD_RE.test(j.location||'') },
  rotterdam: { label:'📍 Rotterdam', test:cityRe(/rotterdam/i) },
  valencia:  { label:'📍 Valencia', test:cityRe(/valencia/i) },
  luxembourg:{ label:'📍 Luxemburgo', test:j=>j.is_lu },
  dublin:    { label:'📍 Dublín', test:cityRe(/dublin/i) },
};
// Sin lista hardcodeada de ambitos por defecto: si el perfil no define scopes
// (todavia sin onboarding), se derivan de los datos reales del usuario (ver
// userScopes) -> cada quien ve las geografias que existen en SUS ofertas.

// palabras clave de sector -> regex dinámica (profiles.sector_keywords)
function sectorRe(){
  const kw = (PROFILE?.sector_keywords||'').split(',').map(s=>s.trim()).filter(Boolean);
  if (!kw.length) return null;
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return new RegExp('\\b('+kw.map(esc).join('|')+')\\b','i');
}
const isSector = j => { const re=sectorRe(); return re ? re.test((j.title||'')+' '+(j.company||'')) : false; };
// Si el perfil no tiene etiquetas propias (via onboarding), NO adivinar un
// numero fijo (antes {1,2,3} escondia el CV4/CV5 de Carlos) -- derivar las
// versiones reales que existen en sus propias ofertas.
const cvLabels = () => {
  if (PROFILE?.cv_labels && Object.keys(PROFILE.cv_labels).length) return PROFILE.cv_labels;
  const found = new Set(DATA.map(j => j.cv_version).filter(v => v != null));
  const out = {};
  [...found].sort((a, b) => a - b).forEach(n => out[n] = `CV ${n}`);
  return out;
};

async function logout(){ await SB.auth.signOut(); location.reload(); }

async function loadProfile(){
  const { data:{ user } } = await SB.auth.getUser();
  let { data, error } = await SB.from('profiles').select('*').eq('user_id', user.id).maybeSingle();
  if (error){ alert('Error cargando perfil: '+error.message); return null; }
  if (!data){
    // primera vez: crea un perfil por defecto (nombre = parte del email)
    const name = (user.email||'').split('@')[0];
    const ins = await SB.from('profiles').insert({ user_id:user.id, display_name:name, full_name:name, theme:'blue' }).select().single();
    data = ins.data;
  }
  return data;
}
async function fetchJobs(){
  let all=[], from=0;
  while(true){
    const { data, error } = await SB.from('jobs').select('*').is('deleted_at', null).range(from, from+999);
    if (error){ alert('Error cargando ofertas: '+error.message); return; }
    all = all.concat(data);
    if (data.length<1000) break; from+=1000;
  }
  DATA = all;
}
async function fetchTrash(){
  const { data } = await SB.from('jobs').select('*').not('deleted_at','is',null).order('deleted_at',{ascending:false});
  return data||[];
}

async function boot(){
  PROFILE = await loadProfile();

  $('brand').innerHTML = `<span class="dot"></span>ApplyBoard${PROFILE.display_name?`<span class="name" style="color:var(--muted);font-weight:500"> · ${esc(PROFILE.display_name)}</span>`:''}`;

  wireControls();

async function load(){

// ============================ estructura UI ============================
function userScopes(){
  if (PROFILE?.scopes && PROFILE.scopes.length) return PROFILE.scopes.filter(k=>SCOPE_DEFS[k]);
  // Sin scopes en el perfil: derivar de los datos REALES -> el usuario ve
  // exactamente las geografias que aparecen en SUS ofertas, sin heredar la
  // lista de otra persona. 'all' siempre; 'remote' si hay algo remoto.
  const keys=['all'];
  for (const k of ['spain','nl','randstad','benelux','ireland','europe']){
    if (DATA.some(j=>SCOPE_DEFS[k].test(j))) keys.push(k);
  }
  if (DATA.some(j=>j.is_remote)) keys.push('remote');
  return keys;
}
function buildScopeSelectors(){
  const prev = $('scope').value;               // preservar seleccion al reconstruir
  const scopes = userScopes();
  $('scope').innerHTML = scopes.map(k=>`<option value="${k}">${SCOPE_DEFS[k].label}</option>`).join('');
  if (scopes.includes(prev)) $('scope').value = prev;
  $('fScope').innerHTML = scopes.filter(k=>k!=='all').map(k=>`<option value="${k}">${SCOPE_DEFS[k].label}</option>`).join('')+'<option value="other">Otro</option>';
  $('fCv').innerHTML = '<option value="">CV ?</option>'+Object.entries(cvLabels()).map(([n,l])=>`<option value="${n}">${esc(l)}</option>`).join('');
}

// ============================ filtrado ============================
function passesCommon(j){
  const minfit = parseInt($('minfit').value);
  if ((j.fit_score??0) < minfit) return false;
  if (!SCOPE_DEFS[$('scope').value].test(j)) return false;
  if ($('noIntern').checked && j.is_internship) return false;
  if ($('noSenior').checked && j.is_senior) return false;
  if ($('noLang').checked && j.blocking_language) return false;
  if ($('withCl').checked && !(j.cl_text||j.cl_exists)) return false;
  return true;
}
function visible(){
  const q=$('q').value.toLowerCase(), site=$('site').value, sort=$('sort').value;
  let out = DATA.filter(j=>{
    const applied=!!j.applied_at, skipped=j.apply_status==='skipped';
    // "Rechazada" = la empresa me rechazo (rechazo) O yo la rechace (skipped)
    const rejected = j.response_status==='rechazo' || skipped;
    if (TAB==='queue'   && (applied||skipped)) return false;
    if (TAB==='sector'  && (applied||skipped||!isSector(j))) return false;
    if (TAB==='starred' && !(j.starred&&!applied)) return false;
    if (TAB==='applied' && !(applied&&j.response_status!=='rechazo')) return false;
    if (TAB==='rejected'&& !rejected) return false;
    if (TAB==='followup'){
      const d=daysAgo(j.applied_at);
      if (!(applied && d>=7 && !j.followup_sent_at && (!j.response_status||j.response_status==='sin_respuesta'))) return false;
    }
    if (['queue','sector','all'].includes(TAB) && !passesCommon(j)) return false;
    if (site && j.site!==site) return false;
    if (q && !((j.title||'').toLowerCase().includes(q)||(j.company||'').toLowerCase().includes(q))) return false;
    return true;
  });
  if (sort==='applied' || TAB==='applied' || TAB==='rejected') out.sort((a,b)=>(b.applied_at||'').localeCompare(a.applied_at||''));
  else if (sort==='discovered') out.sort((a,b)=>(b.discovered_at||'').localeCompare(a.discovered_at||''));
  else if (TAB==='followup') out.sort((a,b)=>(a.applied_at||'').localeCompare(b.applied_at||''));
  else out.sort((a,b)=>(b.starred-a.starred)||((b.fit_score??0)-(a.fit_score??0)));
  return out.slice(0,200);
}

// ============================ KPIs ============================
function computeKpis(){
  const week=new Date(Date.now()-7*86400e3).toISOString();
  const now=new Date(), monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString();
  const applied=DATA.filter(j=>j.applied_at);
  const interviews=DATA.filter(reachedInterview);
  return {
    applied:applied.length,
    week:applied.filter(j=>j.applied_at>=week).length,
    month:applied.filter(j=>j.applied_at>=monthStart).length,
    interviews:interviews.length,
    resp_rate:applied.length?Math.round(100*interviews.length/applied.length):0,
    waiting:applied.filter(j=>!j.response_status||j.response_status==='sin_respuesta').length,
    rejected:DATA.filter(j=>j.response_status==='rechazo').length,
    queue:DATA.filter(j=>(j.fit_score??0)>=8 && !j.is_senior && !j.is_internship && !j.blocking_language && !j.applied_at && j.apply_status!=='skipped').length,
  };
}
function renderKpis(){
  const k=computeKpis();
  $('kpis').innerHTML=`
    <div class="kpi accent"><div class="n">${k.queue}</div><div class="l">cola lista</div></div>
    <div class="kpi"><div class="n">${k.applied}</div><div class="l">enviadas</div></div>
    <div class="kpi good"><div class="n">${k.interviews}</div><div class="l">entrevistas</div></div>
    <div class="kpi"><div class="n">${k.waiting}</div><div class="l">esperando</div></div>`;
}

// ============================ acciones ============================
async function update(id, fields, silent){
  const j=DATA.find(x=>x.id===id); if(!j) return;
  const now=new Date().toISOString(), clean={};
  for (const [k,v] of Object.entries(fields)) clean[k]= v==='now'?now : (v==='null'?null:v);
  const { error }=await SB.from('jobs').update(clean).eq('id', id);
  if (error){ alert('No guardado: '+error.message); return; }
  Object.assign(j, clean);
  if (!silent){ renderKpis(); render(); }
}
async function softDelete(id){
  if (!confirm('¿Eliminar esta oferta? Se puede recuperar desde la papelera 🗑.')) return;
  const { error }=await SB.from('jobs').update({ deleted_at:new Date().toISOString() }).eq('id', id);
  if (error){ alert('No eliminado: '+error.message); return; }
  DATA = DATA.filter(x=>x.id!==id);
  renderKpis(); render();
}
async function restoreJob(id){
  const { error }=await SB.from('jobs').update({ deleted_at:null }).eq('id', id);
  if (error){ alert('No recuperado: '+error.message); return; }
  await fetchJobs(); renderAll(); setTab('trash');
}

function fillTpl(body,j){
  return body.replaceAll('{company}',j?.company||j?.site||'[EMPRESA]')
             .replaceAll('{role}',j?.title||'[PUESTO]')
             .replaceAll('{name}','[NOMBRE]')
             .replaceAll('{me}',PROFILE.full_name||'');
}
function copyTpl(id,tplId,btn){
  const j=DATA.find(x=>x.id===id);
  const tpl=(PROFILE.templates||[]).find(t=>t.id===tplId)||(PROFILE.templates||[])[0];
  if (!tpl){ alert('No hay plantillas configuradas en tu perfil.'); return; }

function copyText(text,btn){

}

// ============================ DASHBOARD (dataviz) ============================
// SVG inline, tema claro/oscuro por CSS vars, acento del usuario. Gráficos
// interactivos: al hacer clic navegan a la lista ya filtrada.

// barras horizontales; cada fila puede llevar onClick (navega a un filtro)
function svgHBars(items, {ordinal=false, colorFn=null}={}){
  if (!items.length || items.every(i=>!i.value)) return '<div class="emptychart">Sin datos todavía.</div>';
  const max=Math.max(...items.map(i=>i.value),1);
  const rowH=28, gap=9, W=360, labelW=104, barMax=W-labelW-44, H=items.length*(rowH+gap)-gap;
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${items.map((it,i)=>{
    const y=i*(rowH+gap), w=Math.max(it.value?3:0,(it.value/max)*barMax);
    const fill=colorFn?colorFn(it):'var(--accent)';
    const op=ordinal?(0.5+0.5*(1-i/Math.max(items.length-1,1))).toFixed(2):1;
    return `<g class="${it.onClick?'hbar-row':''}" ${it.onClick?`onclick="${it.onClick}" style="cursor:pointer"`:''}>
      <title>${esc(it.label)}: ${it.value}</title>
      <text x="0" y="${y+rowH/2}" dominant-baseline="middle" font-size="12" fill="var(--ink2)">${esc(it.label)}</text>
      <rect x="${labelW}" y="${y+3}" width="${barMax}" height="${rowH-6}" rx="5" fill="var(--panel2)"/>
      <rect class="bar" x="${labelW}" y="${y+3}" width="${w}" height="${rowH-6}" rx="5" fill="${fill}" opacity="${op}"/>
      <text x="${labelW+barMax+8}" y="${y+rowH/2}" dominant-baseline="middle" text-anchor="end" font-size="12.5" font-weight="700" fill="var(--ink)" style="text-anchor:start">${it.value}</text>
    </g>`;
  }).join('')}</svg>`;
}
// barras verticales (tendencia / distribución)
function svgVBars(items, {colorFn=null}={}){
  if (!items.length) return '<div class="emptychart">Sin datos todavía.</div>';
  const max=Math.max(...items.map(i=>i.value),1);
  const W=360, H=150, padB=22, n=items.length, slot=W/n, colW=Math.min(30,slot*0.62), barMax=H-padB-16;
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${items.map((it,i)=>{
    const cx=slot*(i+0.5), h=Math.max(it.value?3:0,(it.value/max)*barMax), y=H-padB-h;
    const fill=colorFn?colorFn(it):'var(--accent)';
    return `<g ${it.onClick?`onclick="${it.onClick}" style="cursor:pointer"`:''}><title>${esc(it.label)}: ${it.value}</title>
      <rect x="${cx-colW/2}" y="${y}" width="${colW}" height="${h}" rx="4" fill="${fill}"/>
      ${it.value>0?`<text x="${cx}" y="${y-4}" text-anchor="middle" font-size="10.5" font-weight="700" fill="var(--ink)">${it.value}</text>`:''}
      <text x="${cx}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--ink2)">${esc(it.label)}</text>
    </g>`;
  }).join('')}</svg>`;
}
// donut de estados de las candidaturas enviadas
function svgDonut(segs){
  const total=segs.reduce((s,x)=>s+x.value,0);
  if (!total) return '<div class="emptychart">Aún no has aplicado a ninguna oferta.</div>';
  const R=54, r=34, cx=64, cy=64; let a=-Math.PI/2;
  const arcs=segs.filter(s=>s.value).map(s=>{
    const frac=s.value/total, a2=a+frac*2*Math.PI;
    const large=frac>0.5?1:0;
    const x1=cx+R*Math.cos(a), y1=cy+R*Math.sin(a), x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);
    const xi2=cx+r*Math.cos(a2), yi2=cy+r*Math.sin(a2), xi1=cx+r*Math.cos(a), yi1=cy+r*Math.sin(a);
    a=a2;
    return `<path d="M${x1} ${y1} A${R} ${R} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${r} ${r} 0 ${large} 0 ${xi1} ${yi1} Z" fill="${s.color}" ${s.onClick?`onclick="${s.onClick}" style="cursor:pointer"`:''}><title>${esc(s.label)}: ${s.value}</title></path>`;
  }).join('');
  return `<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <svg viewBox="0 0 128 128" style="width:128px;flex:0 0 auto">${arcs}
      <text x="64" y="60" text-anchor="middle" font-size="24" font-weight="800" fill="var(--ink)" style="font-variant-numeric:tabular-nums">${total}</text>
      <text x="64" y="78" text-anchor="middle" font-size="10" fill="var(--ink2)">enviadas</text></svg>
    <div class="legend" style="flex-direction:column;gap:8px;margin-top:0">
      ${segs.filter(s=>s.value).map(s=>`<span ${s.onClick?`onclick="${s.onClick}" style="cursor:pointer"`:''}><i style="background:${s.color}"></i>${esc(s.label)} · <b style="color:var(--ink)">${s.value}</b></span>`).join('')}
    </div></div>`;
}
function weeklyData(){
  const weeks=[]; const now=new Date(); const monday=new Date(now); monday.setDate(now.getDate()-((now.getDay()+6)%7)); monday.setHours(0,0,0,0);
  for (let i=9;i>=0;i--){ const start=new Date(monday); start.setDate(monday.getDate()-i*7); weeks.push({start, count:0, label:(start.getDate()+'/'+(start.getMonth()+1))}); }
  DATA.filter(j=>j.applied_at).forEach(j=>{
    const t=new Date(j.applied_at).getTime();
    for (let i=0;i<weeks.length;i++){ const s=weeks[i].start.getTime(), e=s+7*86400e3; if (t>=s&&t<e){ weeks[i].count++; break; } }
  });
  return weeks.map(w=>({label:w.label, value:w.count}));
}
// atajos: fijar filtros desde el dashboard y saltar a la lista
function dashGo(tab, opts){ opts=opts||{}; if(opts.minfit!=null)$('minfit').value=opts.minfit; if(opts.scope)$('scope').value=opts.scope; setTab(tab); }
function dashFit(f){ $('minfit').value=String(f); setTab('all'); }

function renderDash(){
  renderKpis();
  const k=computeKpis();
  const offers=DATA.filter(j=>j.response_status==='oferta').length;
  // hero stat tiles (clic = navegar)
  const stats=[
    {v:k.queue, kk:'listas para aplicar', cls:'accent', onClick:`dashGo('queue')`, sub:'fit ≥ 8, sin bloqueos'},
    {v:k.applied, kk:'candidaturas enviadas', onClick:`setTab('applied')`, sub:`${k.week} esta semana · ${k.month} este mes`},
    {v:k.interviews, kk:'entrevistas', cls:'good', onClick:`setTab('applied')`, sub:`tasa de respuesta ${k.resp_rate}%`},
    {v:k.waiting, kk:'esperando respuesta', onClick:`setTab('followup')`, sub:'candidaturas sin cerrar'},
    {v:k.rejected, kk:'rechazadas', cls:'bad', onClick:`setTab('rejected')`, sub:'fuera del pipeline'},
    {v:offers, kk:'ofertas recibidas', cls:'good', sub:'¡el objetivo!'},
  ];
  // embudo
  const funnel=[
    {label:'Descubiertas', value:DATA.length, onClick:`dashGo('all',{minfit:0})`},
    {label:'Aplicadas', value:DATA.filter(j=>j.applied_at).length, onClick:`setTab('applied')`},
    {label:'Entrevista', value:DATA.filter(reachedInterview).length},
    {label:'Oferta', value:offers},
  ];
  // estados de las enviadas (donut)
  const applied=DATA.filter(j=>j.applied_at);
  const inProc=applied.filter(j=>['entrevista','en_proceso'].includes(j.response_status)).length;
  const donut=[
    {label:'Esperando', value:applied.filter(j=>!j.response_status||j.response_status==='sin_respuesta').length, color:'var(--faint)', onClick:`setTab('followup')`},
    {label:'En proceso', value:inProc, color:'var(--accent)'},
    {label:'Oferta', value:applied.filter(j=>j.response_status==='oferta').length, color:'var(--green)'},
    {label:'Rechazo', value:applied.filter(j=>j.response_status==='rechazo').length, color:'var(--danger)', onClick:`setTab('rejected')`},
  ];
  // distribución por fit (clic = ver esas)
  const byFit=[];
  for (let f=10;f>=4;f--) byFit.push({label:String(f), value:DATA.filter(j=>(j.fit_score??-1)===f).length, onClick:`dashFit(${f})`,
    _hi:f>=8});
  const fitColor=it=>it._hi?'var(--green)':'var(--accent)';
  // ofertas por CV recomendado
  const labels=cvLabels();
  const byCv=Object.keys(labels).map(n=>({label:(labels[n]||('CV'+n)).replace(/·.*/,'').trim(),
    value:DATA.filter(j=>j.cv_version===parseInt(n)&&(j.fit_score??0)>=6).length,
    onClick:`dashGo('all',{minfit:6})`})).filter(x=>x.value);

  $('dash').innerHTML=`
    <div class="dash-hero">
      ${stats.map(s=>`<div class="stat ${s.cls||''} ${s.onClick?'clk':''}" ${s.onClick?`onclick="${s.onClick}"`:''}>
        <div class="v">${s.v}</div><div class="k">${s.kk}</div>${s.sub?`<div class="sub2">${s.sub}</div>`:''}</div>`).join('')}
    </div>
    <div class="dash-grid">
      <div class="card"><h3>Embudo de candidaturas <span class="sub">clic para ver</span></h3>${svgHBars(funnel,{ordinal:true})}</div>
      <div class="card"><h3>Estado de las enviadas</h3>${svgDonut(donut)}</div>
      <div class="card"><h3>Aplicaciones por semana <span class="sub">últimas 10</span></h3>${svgVBars(weeklyData())}</div>
      <div class="card"><h3>Distribución por fit <span class="sub">verde = listas</span></h3>${svgVBars(byFit,{colorFn:fitColor})}</div>
      ${byCv.length?`<div class="card span2"><h3>Ofertas relevantes por CV recomendado <span class="sub">fit ≥ 6</span></h3>${svgHBars(byCv)}</div>`:''}
    </div>`;
}

load();
</script>
