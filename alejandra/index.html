<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ApplyBoard — Alejandra · WM & Banca Privada</title>
<style>
  :root { --bg:#14101c; --panel:#1e1830; --panel2:#292140; --text:#ede9f7; --muted:#a294bd;
          --accent:#c084fc; --accent2:#8b5cf6; --green:#4ade80; --danger:#f87171; --gold:#fbbf24; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; }
  header { padding:14px 24px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
           border-bottom:1px solid #382c52; position:sticky; top:0; background:var(--bg); z-index:500; }
  header h1 { font-size:19px; color:var(--accent); }
  .kpis { display:flex; gap:10px; flex-wrap:wrap; margin-left:auto; }
  .kpi { background:var(--panel); border:1px solid #382c52; border-radius:10px; padding:6px 14px;
         text-align:center; }
  .kpi .n { font-size:17px; font-weight:700; color:var(--accent); }
  .kpi .l { font-size:10px; color:var(--muted); }
  .kpi.good .n { color:var(--green); } .kpi.bad .n { color:var(--danger); }
  .tabs { display:flex; gap:6px; padding:12px 24px 0; flex-wrap:wrap; }
  .tab { background:var(--panel); border:1px solid #453760; color:var(--muted); border-radius:999px;
         padding:6px 14px; font-size:13px; cursor:pointer; }
  .tab.active { background:var(--accent2); color:#fff; border-color:var(--accent2); font-weight:600; }
  .controls { display:flex; gap:8px; padding:12px 24px; flex-wrap:wrap; align-items:center;
              background:var(--panel); border-bottom:1px solid #382c52; }
  .controls input, .controls select { background:var(--panel2); color:var(--text);
    border:1px solid #453760; border-radius:8px; padding:7px 10px; font-size:13px; outline:none; }
  .toggle { color:var(--muted); font-size:12px; display:inline-flex; align-items:center; gap:5px;
            cursor:pointer; }
  .toggle input { accent-color:var(--accent2); }
  #count { color:var(--muted); font-size:13px; margin-left:auto; }
  #list { padding:16px 24px; display:flex; flex-direction:column; gap:12px; max-width:1000px; margin:auto; }
  .job { background:var(--panel); border:1px solid #382c52; border-radius:12px; padding:14px 16px; }
  .job.starred { border-color:var(--gold); }
  .job.applied { border-left:4px solid var(--green); }
  .job-top { display:flex; gap:12px; align-items:baseline; flex-wrap:wrap; }
  .fit { font-size:22px; font-weight:800; color:var(--accent); min-width:44px; }
  .fit.high { color:var(--green); }
  .co { font-weight:700; font-size:15px; }
  .ti { font-size:14px; color:var(--text); flex:1 1 100%; margin-top:2px; }
  .meta { color:var(--muted); font-size:12px; margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
  .chip { background:var(--panel2); border-radius:5px; padding:1px 7px; font-size:11px; color:var(--muted); }
  .chip.nl { color:var(--green); }
  .chip.senior { color:var(--gold); }
  .btns { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .btns a, .btns button { background:var(--panel2); border:1px solid #453760; color:var(--text);
    border-radius:8px; padding:6px 12px; font-size:12.5px; cursor:pointer; text-decoration:none; }
  .btns .primary { background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:600; }
  .btns .applybtn { background:var(--green); border-color:var(--green); color:#06220f; font-weight:700; }
  .btns button.on { color:var(--gold); border-color:var(--gold); }
  .btns .danger { color:var(--danger); }
  .btns select { background:var(--panel2); color:var(--text); border:1px solid #453760;
    border-radius:8px; padding:6px 8px; font-size:12.5px; }
  .reasoning { display:none; background:var(--panel2); border-radius:8px; padding:10px 12px;
               font-size:12.5px; color:var(--muted); margin-top:10px; white-space:pre-wrap; }
  .reasoning.open { display:block; }
  .reasoning b { color:var(--text); }
  .notes { width:100%; background:var(--panel2); border:1px solid #382c52; border-radius:8px;
           color:var(--text); font-size:12px; padding:7px 10px; resize:vertical; outline:none;
           margin-top:10px; min-height:30px; }
  .when { color:var(--muted); font-size:12px; }
  #empty { text-align:center; color:var(--muted); padding:60px; }
  .addbtn { background:var(--panel2); color:var(--text); border:1px solid #453760;
            border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:700; display:none;
           overflow:auto; padding:30px 16px; }
  .modal.open { display:block; }
  .modal-inner { background:var(--panel); border-radius:12px; max-width:480px; margin:auto; padding:20px; }
  .modal-inner h2 { color:var(--accent); font-size:18px; margin-bottom:12px; }
  .modal-close { float:right; background:var(--panel2); color:var(--text); border:none;
                 border-radius:8px; padding:6px 12px; cursor:pointer; }
  .addform label { display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
  .addform input, .addform select { width:100%; background:var(--panel2); color:var(--text);
    border:1px solid #453760; border-radius:8px; padding:8px 10px; font-size:13px; }
  .addform button { margin-top:14px; background:var(--accent2); color:#fff; border:none;
    border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; }
  @media (max-width:640px){ #list{padding:12px} .kpis{display:none} }
</style>
</head>
<body>
<header>
  <h1>🌷 ApplyBoard · Alejandra</h1>
  <button class="addbtn" onclick="document.getElementById('addJobModal').classList.add('open')">➕ Añadir manual</button>
  <div class="kpis" id="kpis"></div>
</header>
<div class="tabs">
  <button class="tab active" data-tab="queue">🎯 Aplicar ahora</button>
  <button class="tab" data-tab="wm">🏦 WM & Banca Privada</button>
  <button class="tab" data-tab="starred">⭐ Favoritas</button>
  <button class="tab" data-tab="applied">📤 Aplicadas</button>
  <button class="tab" data-tab="followup">⏰ Follow-ups</button>
  <button class="tab" data-tab="skipped">🗑 Descartadas</button>
  <button class="tab" data-tab="all">Todas (fit ≥ 6)</button>
  <button class="tab" data-tab="templates">📝 Plantillas</button>
  <button class="tab" data-tab="contacts">🏢 Contactos</button>
</div>
<div class="controls">
  <input id="q" placeholder="Buscar puesto o empresa…" size="24">
  <select id="minfit">
    <option value="8">fit ≥ 8</option>
    <option value="7">fit ≥ 7</option>
    <option value="9">fit ≥ 9</option>
    <option value="6">fit ≥ 6</option>
  </select>
  <select id="scope">
    <option value="all" selected>🌍 Todo mi ámbito</option>
    <option value="madrid">🇪🇸 Madrid</option>
    <option value="nl">🇳🇱 Países Bajos</option>
    <option value="randstad">🇳🇱 Randstad</option>
    <option value="benelux">🇧🇪🇱🇺 Bélgica + Luxemburgo</option>
  </select>
  <select id="site"><option value="">Todas las fuentes</option></select>
  <select id="cvFilter" title="Filtrar por CV recomendado">
    <option value="">CV: todos</option>
    <option value="1">CV1 · Español</option>
    <option value="2">CV2 · English</option>
    <option value="3">CV3 · Nederlands</option>
  </select>
  <label class="toggle"><input type="checkbox" id="noFrench" checked> Sin francés requerido</label>
  <label class="toggle"><input type="checkbox" id="noIntern" checked> Sin prácticas</label>
  <label class="toggle"><input type="checkbox" id="noSenior" checked> Sin senior/lead</label>
  <label class="toggle"><input type="checkbox" id="withCl"> Solo con carta lista</label>
  <span id="count"></span>
</div>
<div id="list"></div>
<div id="templates" style="display:none;padding:16px 24px;max-width:1000px;margin:auto"></div>
<div id="contacts" style="display:none;padding:16px 24px;max-width:1000px;margin:auto"></div>

<div class="modal" id="addJobModal">
  <div class="modal-inner">
    <button class="modal-close" onclick="document.getElementById('addJobModal').classList.remove('open')">✕ Cerrar</button>
    <h2>➕ Añadir oferta manual</h2>
    <p style="color:var(--muted);font-size:12px">Para candidaturas fuera del rastreo automático de ApplyPilot (puerta fría, referidos, portales que no cubre...).</p>
    <div class="addform">
      <label>URL de la oferta *</label><input id="ajUrl" placeholder="https://...">
      <label>Empresa *</label><input id="ajCompany" placeholder="Nombre de la empresa">
      <label>Puesto *</label><input id="ajTitle" placeholder="Private Banking Analyst">
      <label>Ubicación</label><input id="ajLocation" placeholder="Madrid / Amsterdam...">
      <label>Ámbito</label>
      <select id="ajScope">
        <option value="madrid">🇪🇸 Madrid</option>
        <option value="nl">🇳🇱 Países Bajos</option>
        <option value="be">🇧🇪 Bélgica</option>
        <option value="lu">🇱🇺 Luxemburgo</option>
        <option value="other">Otro</option>
      </select>
      <label class="toggle" style="margin-top:10px"><input type="checkbox" id="ajRemote"> Remoto</label>
      <label>Fit score (opcional, 0-10)</label><input id="ajFit" type="number" min="0" max="10">
      <label>Notas</label><input id="ajNotes" placeholder="Cómo llegaste a esta oferta...">
      <label class="toggle" style="margin-top:10px"><input type="checkbox" id="ajApplied"> Ya he aplicado</label>
      <button onclick="submitAddJob()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal" id="letterModal">
  <div class="modal-inner" style="max-width:700px">
    <button class="modal-close" onclick="document.getElementById('letterModal').classList.remove('open')">✕ Cerrar</button>
    <h2>✉️ Carta de motivación</h2>
    <div id="letterCompany" style="color:var(--muted);font-size:13px;margin-bottom:10px"></div>
    <pre id="letterText" style="white-space:pre-wrap;font-family:inherit;font-size:13px;background:var(--panel2);
      border-radius:8px;padding:12px;max-height:60vh;overflow:auto"></pre>
    <button style="margin-top:14px;background:var(--accent2);color:#fff;border:none;border-radius:8px;
      padding:10px 18px;font-weight:700;cursor:pointer"
      onclick="copyText(document.getElementById('letterText').textContent, this)">📋 Copiar carta</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
let DATA = [], KPIS = {}, CONTACTS = [], TAB = 'queue';
const $ = id => document.getElementById(id);
const esc = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const validUrl = v => {
  const s = (v == null ? '' : String(v)).trim();
  return (!s || ['none', 'null', 'undefined'].includes(s.toLowerCase())) ? null : s;
};
// Tablas propias de Alejandra: independientes de las de Carlos aunque
// compartan proyecto de Supabase (RLS separa el acceso por email).
const T_JOBS = 'applyboard_jobs_alejandra';
const T_CONTACTS = 'applyboard_contacts_alejandra';

// Puestos del nucleo Wealth Management / banca privada: se detectan por
// palabras clave en el titulo (EN/ES/NL).
const WM_RE = /wealth|private bank|banca privada|family office|asset management|vermogens|private clients?|investment|real estate|inmobiliari[oa]|patrimonio|beleggings/i;
const isWM = j => WM_RE.test(j.title || '');
// Practicas / becas: se descartan por defecto (Alejandra busca indefinido,
// graduate program o traineeship, no mas practicas).
const INTERN_RE = /\b(intern(ship)?s?|pr[aá]cticas|becari[oa]|stagiaire?|werkstudent|working student)\b/i;
const isIntern = j => !!j.is_internship || INTERN_RE.test(j.title || '');
const GRAD_RE = /\b(graduate|trainee(ship)?|young talent|junior)\b/i;
const RANDSTAD_RE = /amsterdam|rotterdam|den haag|the hague|'s-gravenhage|utrecht|amstelveen|haarlem|leiden|delft|schiphol|hoofddorp|zoetermeer|hilversum|almere/i;


// ---------- capa de datos: Supabase (version online) ----------
let SB = null;

// Configuracion incrustada en build (la clave publishable es publica por
// diseno; la seguridad la dan el login + RLS en el servidor).
function sbConfig() {
  return { url: 'https://wzikfazbfgtxljtkkphm.supabase.co', anon: 'sb_publishable_pMmT_8oxKBcqU-fD_4yTqA_YKNVm6jN' };
}

function showLogin() {
  const div = document.createElement('div');
  div.id = 'loginOverlay';
  div.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `<div style="background:var(--panel);padding:30px;border-radius:12px;max-width:340px;width:90%">
    <h2 style="color:var(--accent);margin-bottom:14px">🌷 ApplyBoard · Alejandra</h2>
    <input id="liEmail" type="email" placeholder="Email" autocomplete="username"
      style="width:100%;margin-bottom:8px;background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:9px 10px">
    <input id="liPass" type="password" placeholder="Contraseña" autocomplete="current-password"
      style="width:100%;margin-bottom:12px;background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:9px 10px">
    <button onclick="doLogin()" style="width:100%;background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer">Entrar</button>
    <p id="liErr" style="color:var(--danger);font-size:12px;margin-top:8px"></p></div>`;
  document.body.appendChild(div);
}

async function doLogin() {
  const { error } = await SB.auth.signInWithPassword({
    email: document.getElementById('liEmail').value.trim(),
    password: document.getElementById('liPass').value,
  });
  if (error) { document.getElementById('liErr').textContent = 'Error: ' + error.message; return; }
  document.getElementById('loginOverlay').remove();
  await fetchAll();
}

async function fetchAll() {
  let all = [], from = 0;
  while (true) {
    const { data, error } = await SB.from(T_JOBS).select('*').range(from, from + 999);
    if (error) { alert('Error cargando: ' + error.message); return; }
    all = all.concat(data);
    if (data.length < 1000) break;
    from += 1000;
  }
  DATA = all;
  const { data: cts } = await SB.from(T_CONTACTS).select('*');
  CONTACTS = cts || [];
  const week = new Date(Date.now() - 7 * 86400e3).toISOString();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  KPIS = {
    applied: DATA.filter(j => j.applied_at).length,
    applied_week: DATA.filter(j => j.applied_at && j.applied_at >= week).length,
    applied_month: DATA.filter(j => j.applied_at && j.applied_at >= monthStart).length,
    interviews: DATA.filter(j => ['entrevista','en_proceso','oferta'].includes(j.response_status) || (j.carlos_notes || '').includes('ENTREVISTA')).length,
    waiting: DATA.filter(j => j.applied_at && (!j.response_status || j.response_status === 'sin_respuesta')).length,
    rejected: DATA.filter(j => j.response_status === 'rechazo').length,
    queue_ready: DATA.filter(j => (j.fit_score ?? 0) >= 8 && !j.is_senior && !j.needs_french &&
                                  !isIntern(j) && !j.applied_at && j.apply_status !== 'skipped').length,
  };
  KPIS.resp_rate = KPIS.applied ? Math.round(100 * KPIS.interviews / KPIS.applied) : 0;
  renderAll();
}

function renderAll() {
  $('kpis').innerHTML = `
    <div class="kpi"><div class="n">${KPIS.applied}</div><div class="l">enviadas</div></div>
    <div class="kpi"><div class="n">${KPIS.applied_week}</div><div class="l">esta semana</div></div>
    <div class="kpi"><div class="n">${KPIS.applied_month}</div><div class="l">este mes</div></div>
    <div class="kpi good"><div class="n">${KPIS.interviews} · ${KPIS.resp_rate}%</div><div class="l">entrevistas · tasa</div></div>
    <div class="kpi"><div class="n">${KPIS.waiting}</div><div class="l">esperando</div></div>
    <div class="kpi bad"><div class="n">${KPIS.rejected}</div><div class="l">rechazos</div></div>
    <div class="kpi"><div class="n">${KPIS.queue_ready}</div><div class="l">cola lista</div></div>`;
  const sites = [...new Set(DATA.map(j => j.site))].sort();
  $('site').innerHTML = '<option value="">Todas las fuentes</option>' +
    sites.map(s => `<option>${esc(s)}</option>`).join('');
  render();
}

async function load() {
  const cfg = sbConfig();
  SB = supabase.createClient(cfg.url, cfg.anon);
  const { data: { session } } = await SB.auth.getSession();
  if (!session) { showLogin(); return; }
  await fetchAll();
}


function daysAgo(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400e3);
}

function visible() {
  const q = $('q').value.toLowerCase(), minfit = parseInt($('minfit').value),
        site = $('site').value;
  let out = DATA.filter(j => {
    const applied = !!j.applied_at, skipped = j.apply_status === 'skipped';
    if (TAB === 'queue' && (applied || skipped)) return false;
    if (TAB === 'wm' && (applied || skipped || !isWM(j))) return false;
    if (TAB === 'starred' && !(j.starred && !applied)) return false;
    if (TAB === 'applied' && !applied) return false;
    if (TAB === 'followup') {
      const d = daysAgo(j.applied_at);
      if (!(applied && d >= 7 && !j.followup_sent_at &&
            (!j.response_status || j.response_status === 'sin_respuesta'))) return false;
    }
    if (TAB === 'skipped' && !skipped) return false;
    if (TAB === 'queue' || TAB === 'all' || TAB === 'wm') {
      if ((j.fit_score ?? 0) < minfit) return false;
      const scope = $('scope').value;
      if (scope === 'madrid' && !j.is_spain) return false;
      if (scope === 'nl' && !j.is_nl) return false;
      if (scope === 'randstad' && !(j.is_nl && RANDSTAD_RE.test(j.location || ''))) return false;
      if (scope === 'benelux' && !(j.is_be || j.is_lu)) return false;
      if ($('noFrench').checked && j.needs_french) return false;
      if ($('noIntern').checked && isIntern(j)) return false;
      if ($('noSenior').checked && j.is_senior) return false;
      if ($('withCl').checked && !(j.cl_text || j.cl_exists)) return false;
    }
    const cvf = $('cvFilter').value;
    if (cvf && j.cv_version !== parseInt(cvf)) return false;
    if (site && j.site !== site) return false;
    if (q && !((j.title || '').toLowerCase().includes(q) || (j.company || '').toLowerCase().includes(q))) return false;
    return true;
  });
  if (TAB === 'applied') out.sort((a, b) => (b.applied_at || '').localeCompare(a.applied_at || ''));
  else if (TAB === 'followup') out.sort((a, b) => (a.applied_at || '').localeCompare(b.applied_at || ''));
  else out.sort((a, b) => (b.starred - a.starred) || ((b.fit_score ?? 0) - (a.fit_score ?? 0)));
  return out.slice(0, 150);
}

const RESP_OPTS = ['sin_respuesta', 'entrevista', 'en_proceso', 'oferta', 'rechazo'];

// CV base con el que aplicar (columna cv_version; ApplyPilot sugiere, aqui se
// puede corregir a mano). No se genera un CV por oferta: son 3 versiones
// base por idioma que viven en .applypilot-alejandra\cv_base.
const CV_LABELS = {1: 'CV1 · Español', 2: 'CV2 · English', 3: 'CV3 · Nederlands'};

function cvSelect(j) {
  const opts = ['<option value="">CV ?</option>'].concat(
    Object.entries(CV_LABELS).map(([n, l]) =>
      `<option value="${n}" ${j.cv_version === parseInt(n) ? 'selected' : ''}>${l}</option>`));
  return `<select title="CV base con el que aplicar (sugerido por ApplyPilot, editable)"
    onchange="update(${j.rowid}, {cv_version: this.value ? parseInt(this.value) : null}, true)">${opts.join('')}</select>`;
}

function card(j) {
  const applied = !!j.applied_at;
  const url = validUrl(j.application_url) || validUrl(j.url);
  const external = url && !url.startsWith('email:') && !url.startsWith('outreach:');
  const emailAddr = url && url.startsWith('email:') ? url.slice(6) : null;
  const mailtoHref = emailAddr ? `mailto:${emailAddr}?subject=${encodeURIComponent('Application – ' + (j.title || '') + ' | Alejandra Naarding')}` : null;
  const d = daysAgo(j.applied_at);
  let respSel = '';
  if (applied) {
    respSel = `<select onchange="update(${j.rowid}, {response_status: this.value})">` +
      RESP_OPTS.map(o => `<option ${((j.response_status || 'sin_respuesta') === o) ? 'selected' : ''}>${o}</option>`).join('') +
      '</select>' +
      `<button onclick="copyTemplateFor(${j.rowid}, 'fu_applied', this)">📋 Follow-up</button>` +
      (j.followup_sent_at ? '<span class="chip">follow-up ✓</span>'
        : `<button onclick="update(${j.rowid}, {followup_sent_at: 'now'})">⏰ follow-up hecho</button>`);
  } else {
    respSel = `<button onclick="copyTemplateFor(${j.rowid}, 'li_connect', this)" title="Copiar mensaje de conexión LinkedIn">🔗 LinkedIn</button>`;
  }
  return `<div class="job ${j.starred ? 'starred' : ''} ${applied ? 'applied' : ''}">
    <div class="job-top">
      <span class="fit ${(j.fit_score ?? 0) >= 9 ? 'high' : ''}">${j.fit_score ?? '–'}</span>
      <span class="co">${j.starred ? '⭐ ' : ''}${esc(j.company || j.site)}</span>
      ${applied ? `<span class="when">aplicada ${j.applied_at.slice(0, 10)} · hace ${d}d</span>` : ''}
    </div>
    <div class="ti">${esc(j.title)}</div>
    <div class="meta">
      <span>📍 ${esc((j.location || '?').split(',').slice(0, 2).join(','))}</span>
      <span class="chip">${esc(j.site)}</span>
      ${j.is_nl ? '<span class="chip nl">🇳🇱 NL</span>' : ''}
      ${j.is_spain ? '<span class="chip nl">🇪🇸 Madrid</span>' : ''}
      ${j.is_be ? '<span class="chip nl">🇧🇪 BE</span>' : ''}

                  : (j.cl_exists ? '<span class="chip">carta (solo en PC)</span>' : '')}
    </div>
    <div class="btns">
      ${external ? `<a class="primary" href="${esc(url)}" target="_blank" rel="noopener">🔗 Abrir oferta</a>`
                  : (emailAddr ? `<a class="primary" href="${esc(mailtoHref)}">✉️ Aplicar por email (${esc(emailAddr)})</a>`
                  : (url ? `<span class="chip">${esc(url)}</span>`
                         : `<span class="chip" style="color:var(--danger)">⚠ sin enlace guardado</span>`))}
      ${cvSelect(j)}
      ${(j.cl_text || j.cl_exists) ? `<button onclick="openFile(${j.rowid}, 'cl')">✉️ Carta</button>` : ''}
      <button onclick="this.closest('.job').querySelector('.reasoning').classList.toggle('open')">🧠 Por qué encaja</button>
      <button class="${j.starred ? 'on' : ''}" onclick="update(${j.rowid}, {starred: ${j.starred ? 0 : 1}})">⭐</button>
      ${!applied ? `<button class="applybtn" onclick="if(confirm('¿Marcar como APLICADA?')) update(${j.rowid}, {applied_at: 'now', apply_status: 'applied'})">✅ Aplicada</button>` : ''}
      ${!applied ? `<button class="danger" onclick="update(${j.rowid}, {apply_status: ${j.apply_status === 'skipped' ? 'null' : "'skipped'"}})">${j.apply_status === 'skipped' ? '↩ Recuperar' : '🗑 Descartar'}</button>` : ''}
      ${respSel}
    </div>
    <div class="reasoning"><b>Razonamiento del score:</b>
${esc(j.score_reasoning || 'sin datos')}
${j.conditions_notes ? `
<b>Condiciones (salario, coste de vida, mudanza):</b>
${esc(j.conditions_notes)}` : ''}

<b>Descripción (extracto):</b>
${esc((j.descr || '').slice(0, 900))}</div>
    <textarea class="notes" placeholder="Notas (se guardan solas)…"
      onchange="update(${j.rowid}, {carlos_notes: this.value}, true)">${esc(j.carlos_notes)}</textarea>
  </div>`;
}

function fillTemplate(body, j) {
  return body
    .replaceAll('{company}', j?.company || j?.site || '[EMPRESA]')
    .replaceAll('{role}', j?.title || '[PUESTO]')
    .replaceAll('{name}', '[NOMBRE]');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const old = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = old, 1500);
  });
}

function copyTemplateFor(rowid, tplId, btn) {
  const j = DATA.find(x => x.rowid === rowid);
  const tpl = TEMPLATES.find(t => t.id === tplId);
  copyText(fillTemplate(tpl.body, j), btn);
}

// ---------- contactos (puerta fria) ----------
const C_STATUS = ['por_contactar', 'contactado', 'respondio', 'reunion', 'descartado'];
const C_LABEL = {por_contactar: '📥 Por contactar', contactado: '📤 Contactado',
                 respondio: '💬 Respondió', reunion: '🤝 Reunión', descartado: '🗑'};

function emailPatterns(name, domain) {
  const parts = name.toLowerCase().trim().split(/\s+/).filter(x => x);
  if (!parts.length || !domain) return [];
  const [first, last] = [parts[0], parts[parts.length - 1]];
  const out = [`${first}.${last}@${domain}`, `${first}@${domain}`,
               `${first[0]}${last}@${domain}`, `${first[0]}.${last}@${domain}`,
               `${first}${last[0]}@${domain}`, `${last}@${domain}`];
  return [...new Set(out)];
}

function contactCard(c) {
  const mailto = c.email ? `<a href="mailto:${esc(c.email)}" style="color:var(--accent)">${esc(c.email)}</a>` : '<span style="color:var(--muted)">sin email</span>';
  const li = c.linkedin ? ` · <a href="${esc(c.linkedin)}" target="_blank" style="color:var(--accent)">LinkedIn</a>` : '';
  return `<div class="job" style="margin-bottom:10px">
    <div class="job-top">
      <span class="co">${esc(c.company)}</span>
      <span style="color:var(--muted);font-size:13px">${esc(c.name || '')} ${c.role ? '· ' + esc(c.role) : ''}</span>
      <span style="margin-left:auto"><select onchange="updateContact('${c.uid}', {status: this.value})">
        ${C_STATUS.map(s => `<option value="${s}" ${c.status === s ? 'selected' : ''}>${C_LABEL[s]}</option>`).join('')}
      </select></span>
    </div>
    <div class="meta" style="margin-top:6px">${mailto}${li}
      ${c.last_contacted_at ? ` · último contacto ${c.last_contacted_at.slice(0, 10)}` : ''}
      · <span class="chip">${esc(c.source || '')}</span></div>
    <div class="btns">
      <button onclick="copyColdFor('${c.uid}', this)">📋 Copiar puerta fría</button>
      <button onclick="updateContact('${c.uid}', {last_contacted_at: 'now', status: 'contactado'})">📤 Marcar contactado</button>
    </div>
    <textarea class="notes" placeholder="Notas…" onchange="updateContact('${c.uid}', {notes: this.value}, true)">${esc(c.notes)}</textarea>
  </div>`;
}

function renderContacts() {
  const finder = `
  <div class="job" style="margin-bottom:14px;border-color:var(--accent2)">
    <div class="co" style="margin-bottom:8px">🔎 Encontrar el email de alguien</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="epName" placeholder="Nombre Apellido" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <input id="epDomain" placeholder="empresa.com" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">

    </div>
    <div id="epOut" style="margin-top:8px"></div>
    <div class="meta" style="margin-top:8px">Los patrones más comunes en NL son nombre.apellido@ y n.apellido@. Para verificar sin enviar:
      <a href="https://hunter.io/email-finder" target="_blank" style="color:var(--accent)">hunter.io</a> (25 búsquedas/mes gratis) ·

  </div>
  <div class="job" style="margin-bottom:14px">
    <div class="co" style="margin-bottom:8px">➕ Añadir contacto</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="cCompany" placeholder="Empresa *" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <input id="cName" placeholder="Nombre" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <input id="cRole" placeholder="Cargo" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <input id="cEmail" placeholder="Email" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <input id="cLinkedin" placeholder="URL LinkedIn" style="background:var(--panel2);color:var(--text);border:1px solid #453760;border-radius:8px;padding:7px 10px">
      <button style="background:var(--green);color:#06220f;border:none;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer" onclick="addContact()">Guardar</button>
    </div>
  </div>`;
  const groups = C_STATUS.map(s => {
    const items = CONTACTS.filter(c => c.status === s);
    if (!items.length) return '';
    return `<h3 style="color:var(--muted);font-size:13px;margin:16px 0 8px">${C_LABEL[s]} (${items.length})</h3>` +
      items.map(contactCard).join('');
  }).join('');
  $('contacts').innerHTML = finder + groups;
}

async function addContact() {
  const body = { company: $('cCompany').value.trim(), name: $('cName').value.trim(),
    role: $('cRole').value.trim(), email: $('cEmail').value.trim(),
    linkedin: $('cLinkedin').value.trim() };
  if (!body.company) { alert('La empresa es obligatoria'); return; }
  await apiContactAdd(body);
  await load();
  document.querySelector('.tab[data-tab=contacts]').click();
}

async function updateContact(uid, fields, silent) {
  const res = await apiContactUpdate(uid, fields);
  const c = CONTACTS.find(x => x.uid === uid);
  if (c && res) Object.assign(c, res);
  if (!silent) renderContacts();
}

function copyColdFor(uid, btn) {
  const c = CONTACTS.find(x => x.uid === uid);
  const tpl = TEMPLATES.find(t => t.id === 'cold_hm');
  const text = tpl.body.replaceAll('{company}', c.company)
    .replaceAll('{name}', c.name || '[NOMBRE]').replaceAll('{role}', '[PUESTO]');
  copyText(text, btn);
}

function render() {
  const isTpl = TAB === 'templates', isContacts = TAB === 'contacts';
  $('templates').style.display = isTpl ? 'block' : 'none';
  $('contacts').style.display = isContacts ? 'block' : 'none';
  $('list').style.display = (isTpl || isContacts) ? 'none' : 'flex';
  if (isTpl) { renderTemplates(); $('count').textContent = ''; return; }
  if (isContacts) { renderContacts(); $('count').textContent = CONTACTS.length + ' contactos'; return; }
  const items = visible();
  $('count').textContent = items.length + ' ofertas';
  $('list').innerHTML = items.length ? items.map(card).join('')
    : '<div id="empty">Nada aquí con estos filtros.</div>';
}


async function update(rowid, fields, silent) {
  const j = DATA.find(x => x.rowid === rowid);
  if (!j) return;
  const now = new Date().toISOString();
  const clean = {};
  for (const [k, v] of Object.entries(fields))
    clean[k] = v === 'now' ? now : (v === 'null' ? null : v);
  const { error } = await SB.from(T_JOBS).update(clean).eq('url', j.url);
  if (error) { alert('No guardado: ' + error.message); return; }
  Object.assign(j, clean);
  if (!silent) render();
}

function openFile(rowid, kind) {
  const j = DATA.find(x => x.rowid === rowid);
  if (!j) return;
  if (!j.cl_text) {
    alert('La carta existe en el PC pero todavía no se ha subido el texto a la web.\n' +
          'Hace falta sincronizarla desde ApplyPilot (upload_letters.py) para verla y copiarla aquí.');
    return;
  }
  $('letterCompany').textContent = `${j.company || j.site} — ${j.title || ''}`;
  $('letterText').textContent = j.cl_text;
  $('letterModal').classList.add('open');
}

function collectAddJobForm() {
  const body = {
    url: $('ajUrl').value.trim(), company: $('ajCompany').value.trim(),
    title: $('ajTitle').value.trim(), location: $('ajLocation').value.trim(),
    scope: $('ajScope').value, remote: $('ajRemote').checked,
    fit: $('ajFit').value !== '' ? parseInt($('ajFit').value) : null,
    notes: $('ajNotes').value.trim(), applied: $('ajApplied').checked,
  };
  if (!body.url || !body.company || !body.title) { alert('URL, empresa y puesto son obligatorios'); return null; }
  return body;
}

async function submitAddJob() {
  const body = collectAddJobForm();
  if (!body) return;
  const now = new Date().toISOString();
  const row = {
    url: body.url, application_url: body.url, company: body.company, title: body.title,
    location: body.location, site: 'manual', discovered_at: now,
    fit_score: body.fit, carlos_notes: body.notes,
    is_nl: body.scope === 'nl' ? 1 : 0, is_spain: body.scope === 'madrid' ? 1 : 0,
    is_be: body.scope === 'be' ? 1 : 0, is_lu: body.scope === 'lu' ? 1 : 0,
    is_remote: body.remote ? 1 : 0,
    applied_at: body.applied ? now : null, apply_status: body.applied ? 'applied' : null,
  };
  const { error } = await SB.from(T_JOBS).insert(row);
  if (error) { alert('Error al guardar: ' + error.message); return; }
  $('addJobModal').classList.remove('open');
  ['ajUrl', 'ajCompany', 'ajTitle', 'ajLocation', 'ajFit', 'ajNotes'].forEach(id => $(id).value = '');
  $('ajRemote').checked = false;
  $('ajApplied').checked = false;
  await fetchAll();
  document.querySelector(`.tab[data-tab=${body.applied ? 'applied' : 'all'}]`).click();
}

async function apiContactAdd(body) {
  const uid = Math.random().toString(36).slice(2, 10);
  const { error } = await SB.from(T_CONTACTS).insert({ ...body, uid, source: 'web' });
  if (error) { alert('Error: ' + error.message); return false; }
  return true;
}

async function apiContactUpdate(uid, fields) {
  const now = new Date().toISOString();
  if (fields.last_contacted_at === 'now') fields.last_contacted_at = now;
  const { data, error } = await SB.from(T_CONTACTS).update(fields).eq('uid', uid).select();
  if (error) { alert('No guardado: ' + error.message); return null; }
  return data && data[0];
}


document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  TAB = t.dataset.tab;
  render();
});
['q', 'minfit', 'site', 'scope', 'cvFilter', 'noFrench', 'noIntern', 'noSenior', 'withCl'].forEach(id =>
  $(id).addEventListener('input', render));

load();
